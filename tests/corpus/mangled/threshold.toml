#
# Mangled-corpus accuracy threshold artifact (SC-010 / FR-050)
#
# This file is the canonical decision-of-record for the R-8 decision tree
# (see specs/006-engine-rule-refactor/research.md#r-8 and
# specs/006-engine-rule-refactor/decisions.md#d5--pr-3c-rollback-if-mangled-corpus-accuracy-regresses).
#
# `tools/bench-check.sh` reads this file to decide whether a mangled-corpus
# accuracy run passes. The R-8 decision is binding — reviewer judgment at
# PR 3c merge time is limited to verifying the artifact reflects the
# measured outcome, not to overriding the tree.
#
# At PR 0 this file ships as a scaffold (status = "pending"); PR 3c
# populates it after running the post-PR-3c mangled-corpus bench.

[meta]
# Schema version for this artifact. Bump on structural change.
schema = "marque-threshold-1.0"

# One of:
#   "pending"    — PR 0 scaffold; PR 3c has not yet measured
#   "kept-0.85"  — R-8 case 1: post-3c accuracy ≥ 0.85; existing floor preserved
#   "re-curated" — R-8 case 3: corpus split into mangled-closed-vocab + mangled-open-vocab
#   "reverted"   — R-8 case 4: <0.80 or non-K-Option-2 regression; PRs 3a/3b/3c reverted
status = "pending"

# Human-readable note describing the chosen branch (PR 3c populates).
# Limit to 200 chars; long-form rationale lives in PR 3c review notes.
note = ""

# Date the threshold was last set (PR 3c populates).
set_at = ""

# PR that set the threshold (PR 3c populates with the merge SHA / PR number).
set_by_pr = ""


[thresholds]
# Floor for the canonical mangled corpus (or mangled-closed-vocab/ after re-curation).
# Default 0.85 per SC-010.
mangled_accuracy_floor = 0.85

# Floor for the open-vocab partition, only meaningful when
# status = "re-curated". Open-vocab inputs are diagnostic-only after
# K-Option 2 lockout; this is typically 0.0 by design (the engine
# intentionally does not auto-fix open-vocab tokens, so any positive
# floor would be unreachable).
#
# TOML has no `null`. When status != "re-curated", the value is
# unused; bench-check.sh MUST gate reads on the `status` field, not
# on a sentinel value here.
mangled_open_vocab_floor = 0.0


[corpus]
# Path glob (relative to workspace root) for the corpus the closed-vocab
# floor applies to. Default points at the planned consolidated location;
# PR 3c may add the open_vocab_path entry for a re-curated partition.
closed_vocab_path = "tests/corpus/mangled/**/*.{json,txt}"

# Only meaningful when status = "re-curated"; empty string at other
# statuses. bench-check.sh MUST gate reads on the `status` field
# (TOML has no `null`).
open_vocab_path = ""


[bench-check]
# How tools/bench-check.sh interprets this file:
#
#   if status == "pending":
#       fail with "PR 3c has not yet populated tests/corpus/mangled/threshold.toml"
#       (PR 0 → PR 3b runs MUST NOT block on this; bench-check reads only
#       when invoked against the mangled-accuracy bench, which lands at PR 3c)
#
#   if status == "reverted":
#       fail loudly; this state means PR 3a/3b/3c should not be on the
#       current branch
#
#   if status in {"kept-0.85", "re-curated"}:
#       require accuracy(closed_vocab_path) >= mangled_accuracy_floor
#       if "re-curated": additionally require
#           accuracy(open_vocab_path) >= mangled_open_vocab_floor
