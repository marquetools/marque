# deny.toml — cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

[licenses]
version = 2
allow = [
  "LicenseRef-MarqueLicense-1.0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT-0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Unlicense",
  "Zlib",
  "CC0-1.0",
  "CC-BY-4.0",
]
unused-allowed-license = "allow"
confidence-threshold = 0.93

[[licenses.clarify]]
crate = "marque"
expression = "LicenseRef-MarqueLicense-1.0"
license-files = [{ path = "LICENSE.md", hash = 0xe921130e }]

