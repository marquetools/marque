# cliff.toml — git-cliff changelog configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to the marque workspace are documented in this file.\
\n"""
body = """
{%- macro remote_url() -%}
  https://github.com/marquetools/marque
{%- endmacro -%}

{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.breaking %} (**BREAKING**){% endif %}\
            ([{{ commit.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ commit.id }}))\
    {%- endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "(?i)^feat", group = "Features" },
  { message = "(?i)^fix", group = "Bug Fixes" },
  { message = "(?i)^perf", group = "Performance" },
  { message = "(?i)^refactor", group = "Refactoring" },
  { message = "(?i)^doc", group = "Documentation" },
  { message = "(?i)^test", group = "Testing" },
  { message = "(?i)^ci", group = "CI/CD" },
  { message = "(?i)^chore", group = "Miscellaneous" },
  { message = "(?i)^style", skip = true },
  { message = "^Release ", skip = true },
  { body = ".*", group = "Other" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
