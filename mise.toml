experimental_monorepo_root = true

[shell_alias]
mx = "mise exec --"
mr = "mise run"

[tools]
"cargo:cargo-audit" = "0.22.1"
"cargo:cargo-deny" = "0.19.0"
"cargo:cargo-nextest" = "0.9.29"
"cargo:cargo-smart-release" = "0.21.10"

git-cliff = "2.12.0"
typos = "1.45.1"
tombi = "0.9.2"
rust = "nightly"
yq = "4.52.5"
pnpm = "10.33.0"
node = "24.14.1"
python = "3.13.12"

[settings]
auto_install = true
experimental = true
