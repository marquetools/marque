#:tombi schema.strict = false

experimental_monorepo_root = true

[tools]
"cargo:cargo-auditable" = "0.7.4"
"cargo:cargo-crev" = "0.27.1"
"cargo:cargo-deny" = "0.19.0"
"cargo:cargo-nextest" = "0.9.29"
"cargo:cargo-smart-release" = "0.21.10"
"cargo:cargo-vet" = "0.10.2"
"npm:@contextlint/cli" = "0.9.4"
"npm:sort-package-json" = "3.6.1"
actionlint = "1.7.12"
git-cliff = "2.12.0"
hk = "1.41.1"
node = "24.14.1"
pkl = "0.31.1"
python = "3.13.12"
rust = "nightly"
shellcheck = "0.11.0"
shfmt = "3.13.1"
tombi = "0.9.2"
typos = "1.45.1"
yq = "4.52.5"

[env]
MISE_TRUST = "1"
MISE_YES = "1"
MISE_EXPERIMENTAL = "1"
HK_MISE = "1"
CI = '''{% if get_env(name="GITHUB_ACTIONS", default="") != "" %}true{% else %}false{% endif %}'''

[tasks]
build-wasm = { run = """
wasm-pack build crates/wasm --profiling --target web &&
wasm-opt --enable-bulk-memory-opt --enable-bulk-memory --enable-extended-const --enable-multivalue --enable-nontrapping-float-to-int --enable-reference-types --enable-sign-ext --enable-simd --enable-tail-call --generate-global-effects -O3 --monomorphize --precompute-propagate --low-memory-unused --gufa --vacuum -O3 --converge --strip-toolchain-annotations -o crates/wasm/pkg/marque_wasm_bg_tmp.wasm crates/wasm/pkg/marque_wasm_bg.wasm &&
rm crates/wasm/pkg/marque_wasm_bg.wasm &&
mv crates/wasm/pkg/marque_wasm_bg_tmp.wasm crates/wasm/pkg/marque_wasm_bg.wasm
""" }

# Supply-chain checks. `deny` covers licenses/bans/sources, `audit` owns
# RustSec advisories, and `vet` verifies every dependency is audited or
# exempted. `supply-chain` runs all three the way CI does.
audit = { run = "cargo audit" }
deny = { run = "cargo deny check bans licenses sources" }
vet = { run = "cargo vet --locked" }
supply-chain = { depends = ["deny", "audit", "vet"] }

[settings]
auto_install = true
experimental = true
gpg_verify = true

[monorepo]
config_roots = ["./", "./demo", "crates/*", "./marque"]

[shell_alias]
mx = "mise exec --"
mr = "mise run"
cargo = "cargo auditable"
