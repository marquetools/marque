# Codecov configuration for marque.
# Reference: https://docs.codecov.com/docs/codecov-yaml
# Validate:  https://api.codecov.io/validate

# ---------------------------------------------------------------------------
# Top-level Codecov settings
# ---------------------------------------------------------------------------
codecov:
  require_ci_to_pass: yes     # wait for CI before posting status
  notify:
    after_n_builds: 1         # post status after the first upload
    wait_for_ci: yes

# ---------------------------------------------------------------------------
# Coverage settings
# ---------------------------------------------------------------------------
coverage:
  precision: 2                # two decimal places (e.g. 84.27%)
  round: down                 # always round down
  range: "60...100"           # green range for the badge / graph

  status:
    # Project-level coverage gate — the overall repository target.
    project:
      default:
        target: auto          # track against the base commit (no fixed %)
        threshold: 2%         # allow up to 2% drop before failing
        if_ci_failed: error   # fail the check if the CI job itself failed
        removed_code_behavior: adjust_base  # adjust base when code is removed

    # Patch-level coverage gate — only new/changed lines in a PR.
    #
    # The threshold here applies to REAL covered lines. The companion
    # CI change in `.github/workflows/ci.yml` switches the Coverage
    # job to nightly Rust and sets `RUSTFLAGS=--cfg coverage_nightly`,
    # which activates the existing
    # `#[cfg_attr(coverage_nightly, coverage(off))]` annotations on
    # `mod tests { ... }` blocks across the workspace. With those
    # annotations active, `assert!`-message-continuation lines and
    # other test-block "uncovered" artifacts (which dominated the
    # PR-#303 patch-coverage failure) drop out of the report
    # entirely. What remains is signal, and the 80% target with 5%
    # slack is a meaningful threshold over that signal.
    patch:
      default:
        target: 80%           # new code should be ≥80% covered
        threshold: 5%         # allow small deviations
        if_ci_failed: error

# ---------------------------------------------------------------------------
# Ignore paths — excluded from coverage metrics entirely.
# These are test infrastructure, generated code, build scripts, and benchmarks
# that cargo-llvm-cov's default --ignore-filename-regex does not fully exclude.
# ---------------------------------------------------------------------------
ignore:
  - "crates/test-utils/**"
  - "crates/ism/build.rs"
  - "crates/engine/benches/**"
  - "crates/wasm/tests/**"
  - "crates/ism/tests/**"
  - "tests/**"
  - "benches/**"
  - "scripts/**"
  - "demo/**"
  - "docs/**"
  - "site/**"
  - "tools/**"

# ---------------------------------------------------------------------------
# PR comment settings
# ---------------------------------------------------------------------------
comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  behavior: default           # update existing comment, create if absent
  require_changes: true       # only comment when coverage changes

# ---------------------------------------------------------------------------
# GitHub Checks annotations — disable to prevent noisy annotations on
# closing braces and other non-actionable single-line regions.
# ---------------------------------------------------------------------------
github_checks:
  annotations: false
