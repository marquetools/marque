# Dependabot configuration — automated dependency update PRs.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Supply chain audit finding A1: without automated updates, known
# vulnerabilities in Rust crates, npm packages, and GitHub Actions
# can persist indefinitely.

version: 2

updates:
  
  # ── Rust (Cargo) ──────────────────────────────────────────────────
  - package-ecosystem: cargo
    directories: 
      - /
      - "crates/*/"
      - "marque/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: "chore(deps):"
    groups:
      rust-dependencies:
        group-by: dependency-name
    cooldown:
      default-days: 10
      semver-major-days: 30
      exclude:
        - "marque-*"
        - "marque"
        - "recoco-*"

  # ── npm (demo package) ────────────────────────────────────────────
  - package-ecosystem: npm
    directories:
      - demo/
      - site/
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: America/New_York
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: "chore(deps):"
    groups:
      npm-dependencies:
        group-by: dependency-name
    cooldown:
      default-days: 10
      semver-major-days: 30
      exclude: 
        - "@marque/*"
        - "@knitli/*"

  # ── GitHub Actions ────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directories:
      - .github/actions/
      - .github/workflows
      - .github/
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: America/New_York
    open-pull-requests-limit: 20
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci):"
    groups:
      actions-dependencies:
        group-by: dependency-name
    cooldown:
      default-days: 10
      exclude:
        - "marquetools/*"

