# Nightly performance regression sweep.
#
# The per-PR `bench-check` job in ci.yml runs `scripts/bench-check.sh
# --quick` — the fast interactive-latency gates (SC-001 lint_10kb, SC-002
# decoder_10kb, deadline_overhead, fix_10kb), all on ~10 KB inputs. The
# heavy scaling sweeps are deliberately omitted there because they are the
# only slow benches:
#   - `linear_scaling`  (SC-005 linear-scaling R², 1 KB → 100 KB sweep)
#   - `fix_throughput`  (fix-apply linearity, 1 MB → 100 MB sweep)
#
# This workflow runs the full set (`--full`) on a daily schedule so a
# sub-linear / super-linear regression is caught within ~24h rather than
# per-PR. A failure here is a real regression — the run goes red in the
# Actions tab. The absolute SC ceilings and R² gates are fully enforced
# (no MARQUE_BENCH_SKIP_REGRESSION override is set).
#
# Hardware: `ubuntu-latest` — the same runner class the SC baselines in
# `benches/baseline.json` were captured on, so the numbers are comparable.

name: Nightly benchmarks

on:
  schedule:
    # 07:23 UTC daily. Off-the-hour minute (`23` not `0`) follows the
    # fleet-pile-up convention bench-check.sh and the constitution's bench
    # guidance call out.
    - cron: "23 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: bench-nightly
  cancel-in-progress: false

jobs:
  bench-full:
    name: Full performance regression sweep
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@65012b490220f477f20ab979e35ae732e6de4e68

      - name: scripts/bench-check.sh --full
        run: bash scripts/bench-check.sh --full
