name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (no publish)"
        type: boolean
        default: true
      bump:
        description: "Version bump"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      no-publish:
        description: "Don't publish to crates.io?"
        type: boolean
        default: false
      no-verify:
        description: "Pass no-verify to cargo publish"
        type: boolean
        default: false
      crates-to-bump:
        description: "space-separated list of crates to bump directly, no not provided, runs smart-release with defaults."
        type: string
        default: ''

permissions:
  contents: write
  # `id-token: write` is required for Sigstore keyless signing via the
  # GitHub OIDC provider; used by both `crates-io-auth-action` (for
  # crates.io token exchange) and `attest-build-provenance` (for the
  # SLSA provenance signature).
  id-token: write
  # `attestations: write` lets `attest-build-provenance` record the
  # signed attestation to GitHub's attestation store. Without this the
  # signing step cannot persist its output.
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: cargo
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@65012b490220f477f20ab979e35ae732e6de4e68

      - name: Install release tooling
        run: cargo install cargo-smart-release git-cliff --locked

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - uses: rust-lang/crates-io-auth-action@1d2b8f3552d69b407d7790fa3ec7c39041305a61
        id: auth
      - name: Publish crates
        env:
            CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS="--bump ${{ inputs.bump }} \
            --allow-fully-generated-changelogs \
            --auto-publish-of-stable-crates \
            --no-bump-on-demand \
            --no-changelog-preview \
            -d patch \
            -u"
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run-cargo-publish"
          else
            FLAGS="$FLAGS -e"
          fi
          if [ "${{ inputs.no-publish }}" = "true" ]; then
            FLAGS="$FLAGS --no-publish"
          fi
          if [ "${{ inputs.no-verify }}" = "true" ]; then
            FLAGS="$FLAGS --dangerously-pass-no-verify"
          fi
          if [ "${{ inputs.crates-to-bump }}" != '' ]; then
             FLAGS="$FLAGS ${{ inputs.crates-to-bump }}"
          else
             FLAGS="$FLAGS \
             marque-capco \
             marque-config \
             marque-core \
             marque-engine \
             marque-extract \
             marque-ism \
             marque-rules \
             marque-scheme \
             marque marque-server \
             marque-test-utils \
             marque-wasm"
          fi
          cargo smart-release $FLAGS

      - name: Create workspace tag
        id: tag
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "marque") | .version')
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag -a "$TAG" -m "Release ${TAG}"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      # Whitepaper §8.7 / gap register #13 — SLSA build provenance for
      # every non-dry-run release. `git archive` produces a
      # workspace-scoped source tarball from the tag. This archive is
      # NOT equivalent to any crates.io per-crate tarball (crates.io
      # uses `cargo package` with per-crate include/exclude rules); it
      # is a separately verifiable workspace-state provenance artifact.
      # `attest-build-provenance` signs it keylessly via Sigstore and
      # records the attestation in GitHub's transparency log. Consumers
      # verify with:
      #   gh attestation verify marque-<version>.tar.gz --owner marquetools
      #
      # The archive/attest/release steps gate on `dry-run == false`
      # only (not on `steps.tag.outputs.created == 'true'`) so a
      # re-triggered release run for an existing tag completes the
      # attestation + GitHub-release work even if the tag itself was
      # created by a prior (failed) run. `softprops/action-gh-release`
      # upserts — if the release exists, the signed archive is
      # attached; if not, the release is created. Re-attesting an
      # already-attested archive produces a fresh signature bound to
      # the same subject digest.
      - name: Build source archive
        id: archive
        if: inputs.dry-run == false
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          TAG="${{ steps.tag.outputs.tag }}"
          ARCHIVE="marque-${VERSION}.tar.gz"
          git archive --format=tar.gz \
            --prefix="marque-${VERSION}/" \
            -o "${ARCHIVE}" \
            "${TAG}"
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      # Issue #191 — SBOM generation in two formats:
      #   1. SPDX (tag-value) via `reuse spdx` — generated from existing
      #      REUSE annotations; covers every file's license and copyright.
      #      NTIA minimum-elements compliant. `reuse` is already pinned in
      #      CI (`ci.yml` `reuse` job); the same version is installed here
      #      to keep behavior consistent.
      #   2. CycloneDX (JSON + XML) via `cargo cyclonedx` — walks
      #      Cargo.lock and emits the full transitive dep graph with
      #      versions, licenses, and checksums. The format most SBOM
      #      consumers and vulnerability scanners (Grype, Trivy,
      #      Dependency-Track) expect for supply-chain analysis.
      #
      # This step intentionally runs BEFORE `Generate changelog` so the
      # working tree matches the tagged commit exactly. The changelog
      # commit (CHANGELOG.md only) is post-tag and must not influence
      # the SBOM content.
      - name: Generate SBOMs
        id: sbom
        if: inputs.dry-run == false
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          # SPDX — generated from existing REUSE annotations
          pipx install "reuse==5.0.2"
          reuse spdx \
            --output "marque-${VERSION}.spdx" \
            --add-license-concluded \
            --creator-organization "Knitli Inc."
          # CycloneDX — full transitive dependency graph from Cargo.lock
          cargo install cargo-cyclonedx --version 0.5.7 --locked
          cargo cyclonedx --format json --workspace \
            --output-file "marque-${VERSION}.cyclonedx.json"
          cargo cyclonedx --format xml --workspace \
            --output-file "marque-${VERSION}.cyclonedx.xml"
          echo "spdx=marque-${VERSION}.spdx" >> "$GITHUB_OUTPUT"
          echo "cdx=marque-${VERSION}.cyclonedx.json" >> "$GITHUB_OUTPUT"
          echo "cdxml=marque-${VERSION}.cyclonedx.xml" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        run: git cliff --output CHANGELOG.md

      - name: Commit changelog and push
        run: |
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: update CHANGELOG.md for ${{ steps.tag.outputs.tag }}"
          fi
          if [ "${{ inputs.dry-run }}" = "false" ]; then
            git push origin main --follow-tags
          else
            echo "Dry run — skipping push"
          fi

      - name: Attest source archive
        if: inputs.dry-run == false
        uses: actions/attest-build-provenance@10334b5f1e684784025c3fc0a277c88c19089275
        with:
          subject-path: ${{ steps.archive.outputs.archive }}

      - name: Attest SBOMs
        if: inputs.dry-run == false
        uses: actions/attest-build-provenance@10334b5f1e684784025c3fc0a277c88c19089275
        with:
          subject-path: |
            ${{ steps.sbom.outputs.spdx }}
            ${{ steps.sbom.outputs.cdx }}
            ${{ steps.sbom.outputs.cdxml }}

      - name: Create GitHub release
        if: inputs.dry-run == false
        uses: softprops/action-gh-release@403a5240f3837fa857f642062e05aad6bb3391ca
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: |
            ${{ steps.archive.outputs.archive }}
            ${{ steps.sbom.outputs.spdx }}
            ${{ steps.sbom.outputs.cdx }}
            ${{ steps.sbom.outputs.cdxml }}
          generate_release_notes: true
          body: |
            Signed source archive: `${{ steps.archive.outputs.archive }}`
            SBOMs: `${{ steps.sbom.outputs.spdx }}` (SPDX), `${{ steps.sbom.outputs.cdx }}` (CycloneDX JSON), `${{ steps.sbom.outputs.cdxml }}` (CycloneDX XML)

            The source archive is a workspace-state provenance artifact from
            `git archive` at the release tag. It is not byte-identical
            to any crates.io per-crate tarball — crates.io uses
            `cargo package` with per-crate `include`/`exclude` rules.

            Verify all artifacts with the GitHub CLI:

            ```
            gh attestation verify ${{ steps.archive.outputs.archive }} \
              --owner marquetools
            gh attestation verify ${{ steps.sbom.outputs.spdx }} \
              --owner marquetools
            gh attestation verify ${{ steps.sbom.outputs.cdx }} \
              --owner marquetools
            gh attestation verify ${{ steps.sbom.outputs.cdxml }} \
              --owner marquetools
            ```
