name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (no publish)"
        type: boolean
        default: true
      bump:
        description: "Version bump"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  release:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - uses: Swatinem/rust-cache@v2

      - name: Install release tooling
        run: cargo install cargo-smart-release git-cliff --locked

      - name: Generate changelog
        run: git cliff --output CHANGELOG.md

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore: update CHANGELOG.md"

      - name: Publish
        run: |
          FLAGS="--bump ${{ inputs.bump }} --no-changelog"
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run-cargo-publish"
          fi
          cargo smart-release --execute $FLAGS \
            marque-ism marque-rules marque-core marque-config \
            marque-extract marque-capco marque-engine \
            marque-wasm marque-server marque
