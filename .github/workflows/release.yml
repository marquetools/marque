name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (no publish)"
        type: boolean
        default: true
      bump:
        description: "Version bump"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: cargo
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@ved5e89b8ff3145597af131187c6118e451e2ed12

      - name: Install release tooling
        run: cargo install cargo-smart-release git-cliff --locked

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - uses: rust-lang/crates-io-auth-action@vd23e276d99b694606e914c2c61a69d49b247762c
        id: auth
      - name: Publish crates
        env:
            CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          FLAGS="--bump ${{ inputs.bump }} --no-changelog"
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run-cargo-publish"
          fi
          cargo smart-release -u --execute $FLAGS \
            marque-ism marque-rules marque-core marque-config \
            marque-extract marque-capco marque-engine \
            marque-wasm marque-server marque

      - name: Create workspace tag
        id: tag
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "marque") | .version')
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag -a "$TAG" -m "Release ${TAG}"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        run: git cliff --output CHANGELOG.md

      - name: Commit changelog and push
        run: |
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: update CHANGELOG.md for ${{ steps.tag.outputs.tag }}"
          fi
          if [ "${{ inputs.dry-run }}" = "false" ]; then
            git push origin main --follow-tags
          else
            echo "Dry run — skipping push"
          fi
