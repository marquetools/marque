name: Release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (no publish)"
        type: boolean
        default: true
      bump:
        description: "Version bump"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write
  # `id-token: write` is required for Sigstore keyless signing via the
  # GitHub OIDC provider; used by both `crates-io-auth-action` (for
  # crates.io token exchange) and `attest-build-provenance` (for the
  # SLSA provenance signature).
  id-token: write
  # `attestations: write` lets `attest-build-provenance` record the
  # signed attestation to GitHub's attestation store. Without this the
  # signing step cannot persist its output.
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: cargo
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@v2

      - name: Install release tooling
        run: cargo install cargo-smart-release git-cliff --locked

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - uses: rust-lang/crates-io-auth-action@3aeff7023ad8cf78f561cbd7ac7fbc6cdb5d16b1
        id: auth
      - name: Publish crates
        env:
            CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS="--bump ${{ inputs.bump }} --no-changelog"
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run-cargo-publish"
          fi
          cargo smart-release -u --execute $FLAGS \
            marque-ism marque-rules marque-core marque-config \
            marque-extract marque-capco marque-engine \
            marque-wasm marque-server marque

      - name: Create workspace tag
        id: tag
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "marque") | .version')
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag -a "$TAG" -m "Release ${TAG}"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        run: git cliff --output CHANGELOG.md

      - name: Commit changelog and push
        run: |
          git add CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: update CHANGELOG.md for ${{ steps.tag.outputs.tag }}"
          fi
          if [ "${{ inputs.dry-run }}" = "false" ]; then
            git push origin main --follow-tags
          else
            echo "Dry run — skipping push"
          fi

      # Whitepaper §8.7 / gap register #13 — SLSA build provenance for
      # every non-dry-run release. `git archive` produces a reproducible
      # source tarball from the tag; `attest-build-provenance` signs it
      # keylessly via Sigstore and records the attestation in GitHub's
      # transparency log. Consumers can verify with
      # `gh attestation verify marque-<version>.tar.gz --owner marquetools`.
      - name: Build source archive
        id: archive
        if: inputs.dry-run == false && steps.tag.outputs.created == 'true'
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          TAG="${{ steps.tag.outputs.tag }}"
          ARCHIVE="marque-${VERSION}.tar.gz"
          git archive --format=tar.gz \
            --prefix="marque-${VERSION}/" \
            -o "${ARCHIVE}" \
            "${TAG}"
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      # TODO(sha-pin): actions/attest-build-provenance should be pinned
      # to a commit SHA before this workflow runs for a real release.
      # Tag pin here is deliberately left for a dependabot/maintainer
      # pass — unverified SHAs are a supply-chain defect equivalent to
      # fabricated citations (Constitution VIII).
      - name: Attest source archive
        if: inputs.dry-run == false && steps.tag.outputs.created == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.archive.outputs.archive }}

      # TODO(sha-pin): same as above for softprops/action-gh-release.
      - name: Create GitHub release
        if: inputs.dry-run == false && steps.tag.outputs.created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: ${{ steps.archive.outputs.archive }}
          generate_release_notes: true
          body: |
            Signed source archive: `${{ steps.archive.outputs.archive }}`

            Verify with the GitHub CLI:

            ```
            gh attestation verify ${{ steps.archive.outputs.archive }} \
              --owner marquetools
            ```
