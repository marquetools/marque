name: Check ODNI ISM Schema Updates

# Runs on the 1st of every month. The ISM spec updates infrequently (last: Nov 2022).
# Also triggerable manually for testing or after a suspected release.
on:
  schedule:
    - cron: '0 9 1 * *'   # 09:00 UTC, 1st of month
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-schema:
    name: Check for ISM schema updates
    runs-on: ubuntu-latest

    env:
      ODNI_ISM_PAGE: >-
        https://www.odni.gov/index.php/who-we-are/organizations/ic-cio/ic-technical-specifications/information-security-marking-metadata
      # Expected pattern for the download link on the ODNI page.
      # URL form: /files/documents/CIO/ICEA/MmmYYYY/ISM/ISM-Public-Standalone.zip
      LINK_PATTERN: '/files/documents/CIO/ICEA/[A-Z][a-z]+[0-9]{4}/ISM/ISM-Public-Standalone\.zip'

    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      # -----------------------------------------------------------------------
      # Ensure issue labels exist (idempotent)
      # -----------------------------------------------------------------------
      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "schema-update" \
            --description "New ODNI ISM schema version available" \
            --color "0075ca" --force

          gh label create "schema-check-failure" \
            --description "ISM schema version check could not complete" \
            --color "e4e669" --force

      # -----------------------------------------------------------------------
      # Read the pinned version committed in the repo
      # -----------------------------------------------------------------------
      - name: Read pinned schema version
        id: pinned
        run: |
          VERSION=$(tr -d '[:space:]' < crates/marque-capco/schemas/CURRENT_VERSION)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Pinned version: ${VERSION}"

      # -----------------------------------------------------------------------
      # Fetch the ODNI ISM page with retries.
      # The page is the source of truth; unreachable = signal worth acting on.
      # All expression values are passed through env: to avoid injection.
      # -----------------------------------------------------------------------
      - name: Fetch ODNI ISM page
        id: fetch
        env:
          PAGE_URL: ${{ env.ODNI_ISM_PAGE }}
        run: |
          FETCH_OK=false
          HTTP_STATUS=""

          for attempt in 1 2 3; do
            echo "Fetch attempt ${attempt}…"
            HTTP_STATUS=$(curl \
              --silent \
              --location \
              --max-time 30 \
              --write-out "%{http_code}" \
              --output /tmp/ism-page.html \
              "${PAGE_URL}" 2>/dev/null)

            if [ "${HTTP_STATUS}" = "200" ]; then
              FETCH_OK=true
              break
            fi

            echo "  → HTTP ${HTTP_STATUS}, retrying in 15s"
            [ "${attempt}" -lt 3 ] && sleep 15
          done

          echo "fetch_ok=${FETCH_OK}"      >> "$GITHUB_OUTPUT"
          echo "http_status=${HTTP_STATUS}" >> "$GITHUB_OUTPUT"

          if [ "${FETCH_OK}" = "true" ]; then
            echo "Page fetched successfully (HTTP 200)"
          else
            echo "::warning::Failed to fetch ODNI page after 3 attempts (HTTP ${HTTP_STATUS})"
          fi

      # -----------------------------------------------------------------------
      # Extract the download link and parse the version.
      # Deliberately strict: we want to know if the URL pattern changes.
      # -----------------------------------------------------------------------
      - name: Extract version from page
        id: extract
        if: steps.fetch.outputs.fetch_ok == 'true'
        env:
          PATTERN: ${{ env.LINK_PATTERN }}
        run: |
          LINK=$(grep -oP "${PATTERN}" /tmp/ism-page.html | head -1)

          if [ -z "${LINK}" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No ISM download link matching expected pattern found on ODNI page"
          else
            # URL segment is MmmYYYY (e.g. Dec2022). Normalise to YYYY-MON (e.g. 2022-DEC)
            # to match the directory and CURRENT_VERSION convention used in this repo.
            RAW_VERSION=$(echo "${LINK}" | grep -oP '[A-Z][a-z]+[0-9]{4}')
            YEAR=$(echo "${RAW_VERSION}"  | grep -oP '[0-9]{4}')
            MON=$(echo "${RAW_VERSION}"   | grep -oP '^[A-Za-z]+' | tr '[:lower:]' '[:upper:]')
            VERSION="${YEAR}-${MON}"
            FULL_URL="https://www.odni.gov${LINK}"

            echo "found=true"          >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}"  >> "$GITHUB_OUTPUT"
            echo "url=${FULL_URL}"     >> "$GITHUB_OUTPUT"
            echo "Raw version on page: ${RAW_VERSION} → normalised: ${VERSION}"
            echo "Download URL: ${FULL_URL}"
          fi

      # -----------------------------------------------------------------------
      # Log status
      # -----------------------------------------------------------------------
      - name: Report status
        if: >
          steps.fetch.outputs.fetch_ok == 'true' &&
          steps.extract.outputs.found == 'true'
        env:
          PINNED_VERSION: ${{ steps.pinned.outputs.version }}
          FOUND_VERSION: ${{ steps.extract.outputs.version }}
        run: |
          if [ "${PINNED_VERSION}" = "${FOUND_VERSION}" ]; then
            echo "Schema is current: ${PINNED_VERSION}"
          else
            echo "::notice::Schema update available: ${PINNED_VERSION} → ${FOUND_VERSION}"
          fi

      # -----------------------------------------------------------------------
      # New schema version found — open an issue if one isn't already open
      # -----------------------------------------------------------------------
      - name: Open issue for new schema version
        if: >
          steps.fetch.outputs.fetch_ok == 'true' &&
          steps.extract.outputs.found == 'true' &&
          steps.extract.outputs.version != steps.pinned.outputs.version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.extract.outputs.version }}
          OLD_VERSION: ${{ steps.pinned.outputs.version }}
          DOWNLOAD_URL: ${{ steps.extract.outputs.url }}
          PAGE_URL: ${{ env.ODNI_ISM_PAGE }}
        run: |
          EXISTING=$(gh issue list \
            --label "schema-update" \
            --state open \
            --json number \
            --jq length)

          if [ "${EXISTING}" != "0" ]; then
            echo "Schema update issue already open (${EXISTING} open). Skipping."
            exit 0
          fi

          BODY=$(cat <<EOF
          ## ODNI ISM Schema Update Detected
          
          A new version of the ISM specification has been published on the ODNI page.
          
          | | Version |
          |---|---|
          | **Pinned in repo** | \`${OLD_VERSION}\` |
          | **Available**      | \`${NEW_VERSION}\` |
          
          ### Download
          
          ${DOWNLOAD_URL}
          
          ### Update checklist
          
          - [ ] Download and extract the schema ZIP
          - [ ] Create \`crates/marque-capco/schemas/ISM-v${NEW_VERSION}/\` and populate from the ZIP (which extracts to an \`ISM/\` root):
            - \`ISM/CVE/ISM/\`              → \`CVE_ISM/\`
            - \`ISM/CVE/CveSchema/ISMCAT/\` → \`CVE_ISMCAT/\`
            - \`ISM/Schema/ISM/\`           → \`Schema/\`
            - \`ISM/Schematron/ISM/\`       → \`Schematron/\`
          - [ ] Update \`crates/marque-capco/schemas/CURRENT_VERSION\` → \`${NEW_VERSION}\`
          - [ ] Update \`[package.metadata.marque] ism-schema-version\` in \`crates/marque-capco/Cargo.toml\`
          - [ ] Update \`SCHEMA_VERSION\` constant in \`crates/marque-capco/src/lib.rs\`
          - [ ] Update default \`capco.version\` in \`crates/marque-config/src/lib.rs\`
          - [ ] Update \`SCHEMA_VERSION\` constant in \`crates/marque-capco/build.rs\`
          - [ ] Run \`cargo build -p marque-capco\` and review \`build.rs\` output diffs
          - [ ] Update migration rules for any newly deprecated or renamed markings
          - [ ] Bump \`marque-capco\` crate version and update changelog
          - [ ] Update pinned schema version in integration tests
          
          ### Notes
          
          Review the ISM release notes for:
          - New SCI controls or SAR identifiers added to CVE
          - Deprecated markings and their canonical replacements
          - Changes to block ordering rules
          - Changes to CAB (Classification Authority Block) requirements
          
          ---
          *Detected by the [ISM schema update checker](.github/workflows/check-ism-schema.yml)*
          EOF
          )
          
                    gh issue create \
                      --title "ISM schema update available: ${NEW_VERSION}" \
                      --label "schema-update" \
                      --body "${BODY}"
          
                    echo "Issue created for schema update: ${OLD_VERSION} → ${NEW_VERSION}"
          
                # -----------------------------------------------------------------------
                # Page unreachable after retries — open an issue if one isn't already open.
                # This signals either site downtime OR the URL has moved.
                # -----------------------------------------------------------------------
                - name: Open issue for fetch failure
                  if: steps.fetch.outputs.fetch_ok == 'false'
                  env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    HTTP_STATUS: ${{ steps.fetch.outputs.http_status }}
                    PAGE_URL: ${{ env.ODNI_ISM_PAGE }}
                  run: |
                    EXISTING=$(gh issue list \
                      --label "schema-check-failure" \
                      --state open \
                      --json number \
                      --jq length)
          
                    if [ "${EXISTING}" != "0" ]; then
                      echo "Failure issue already open. Skipping."
                      exit 0
                    fi
          
                    BODY=$(cat <<EOF
          ## ISM Schema Check: Fetch Failure
          
          The monthly ISM schema check could not reach the ODNI page after 3 attempts.
          
          **Monitored URL:**
          \`\`\`
          ${PAGE_URL}
          \`\`\`
          
          **HTTP status received:** \`${HTTP_STATUS}\`
          **Date:** $(date -u '+%Y-%m-%d')
          
          ### Possible causes
          
          | HTTP Status | Likely cause |
          |---|---|
          | \`000\` | Network error or ODNI site down |
          | \`301\` / \`302\` | Page moved — check for redirect destination |
          | \`403\` | Access control change |
          | \`404\` | Page removed — find new location |
          
          ### Action required
          
          1. Manually verify the ODNI ISM page is accessible
          2. If the URL has changed, update \`ODNI_ISM_PAGE\` in \`.github/workflows/check-ism-schema.yml\`
          3. Close this issue once resolved
          
          ---
          *Raised by the [ISM schema update checker](.github/workflows/check-ism-schema.yml)*
          EOF
          )
          
                    gh issue create \
                      --title "ISM schema check failed: ODNI page unreachable (HTTP ${HTTP_STATUS})" \
                      --label "schema-check-failure" \
                      --body "${BODY}"
          
                # -----------------------------------------------------------------------
                # Page reachable but link pattern not found — URL structure may have changed
                # -----------------------------------------------------------------------
                - name: Open issue for parse failure
                  if: >
                    steps.fetch.outputs.fetch_ok == 'true' &&
                    steps.extract.outputs.found == 'false'
                  env:
                    GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                    PAGE_URL: ${{ env.ODNI_ISM_PAGE }}
                    PATTERN: ${{ env.LINK_PATTERN }}
                  run: |
                    EXISTING=$(gh issue list \
                      --label "schema-check-failure" \
                      --state open \
                      --json number \
                      --jq length)
          
                    if [ "${EXISTING}" != "0" ]; then
                      echo "Failure issue already open. Skipping."
                      exit 0
                    fi
          
                    BODY=$(cat <<EOF
          ## ISM Schema Check: Parse Failure
          
          The monthly ISM schema check reached the ODNI page (HTTP 200) but could not
          find a download link matching the expected pattern.
          
          **Monitored URL:**
          \`\`\`
          ${PAGE_URL}
          \`\`\`
          
          **Expected link pattern:**
          \`\`\`
          ${PATTERN}
          \`\`\`
          
          **Date:** $(date -u '+%Y-%m-%d')
          
          ### What this means
          
          ODNI may have changed the download URL structure or page layout.
          The page is accessible but the automated check can no longer parse the version.
          
          ### Action required
          
          1. Visit the [ODNI ISM page](${PAGE_URL}) manually and find the current download link
          2. If the URL pattern has changed, update \`LINK_PATTERN\` in \`.github/workflows/check-ism-schema.yml\`
          3. If a newer schema version is available, follow the update checklist (see schema-update issue template)
          4. Close this issue once resolved
          
          ---
          *Raised by the [ISM schema update checker](.github/workflows/check-ism-schema.yml)*
          EOF
          )
          
                    gh issue create \
                      --title "ISM schema check failed: download link not found on ODNI page" \
                      --label "schema-check-failure" \
                      --body "${BODY}"
