name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Format + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "nightly"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f

      - name: cargo fmt
        run: cargo fmt --check

      - name: typos
        uses: crate-ci/typos@7c572958218557a3272c2d6719629443b5cc26fd

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "nightly"

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f

      - uses: taiki-e/install-action@711e1c3275189d76dcc4d34ddea63bf96ac49090
        with:
          tool: cargo-nextest

      - name: cargo nextest
        run: cargo nextest run --workspace --profile ci

  # T025 / SC-014 — Refactor-006 PR-3a-only corpus regression sweep.
  #
  # PR 3a is the keystone "pivot type split + transitional adapter"
  # commit on the `refactor-006-pr-3a` branch. The PR's revertability
  # gate (consolidated plan §3.1, design doc §1) is byte-identical
  # behavior on every fixture: every corpus regression test must pass
  # against PR-3a HEAD with no rule semantics change.
  #
  # This job runs the corpus-regression suite (`*corpus*` integration
  # tests in `crates/{capco,engine}/tests/` plus marque/tests/) on the
  # PR-3a branch only — `if:` filters by branch name so the job doesn't
  # run on unrelated PRs. PR 3b and PR 3c will land their own matrix
  # entries with the same body and a different branch filter; running
  # them separately keeps "did PR 3a regress?" answerable from the CI
  # log alone, not by re-bisecting through the keystone window.
  pr-3a-corpus-regression:
    name: PR 3a corpus regression (T025)
    needs: check
    if: github.ref == 'refs/heads/refactor-006-pr-3a' || github.head_ref == 'refactor-006-pr-3a'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "nightly"

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f

      # Corpus regression tests live in `crates/{capco,engine}/tests/`
      # and `marque/tests/`. `cargo test --test` matches an exact
      # integration-test target name within ONE package; `--workspace`
      # combined with `--test` fails when the named target doesn't
      # exist in every member crate. Invoke each suite per-package
      # explicitly (Copilot review feedback on PR #315):
      #   - corpus_parity     in marque-capco
      #   - corpus_accuracy   in marque-engine
      #   - corpus_provenance in marque
      #
      # When new corpus suites land, add them here in the same shape.
      # `--features marque-engine/corpus-override` enables the SC-002
      # decoder accuracy gate that lives behind the same feature flag
      # as the corpus override audit-trail tests.
      - name: cargo test corpus regression suites
        run: |
          cargo test -p marque-capco --test corpus_parity \
            --features marque-engine/corpus-override
          cargo test -p marque-engine --test corpus_accuracy \
            --features marque-engine/corpus-override
          cargo test -p marque --test corpus_provenance \
            --features marque-engine/corpus-override

      # Phase 4 (US2) regression suites are file-level gated on
      # `decoder-harness` and `corpus-override` features that are NOT
      # in any default feature set. Without this explicit invocation
      # the SC-004 always-on regression floor (decoder_accuracy.rs)
      # and the corpus-override audit-trail invariants
      # (corpus_override.rs + cli_corpus_override.rs) are dormant.
      # Enable both features here so those non-ignored gated suites run.
      # `decoder_diagnostic.rs` is also gated on `decoder-harness`, but
      # its tests are all `#[ignore]`-marked (issue #133 root-cause
      # traces) and require an explicit `--run-ignored` invocation;
      # they intentionally do not run in this step.
      #
      # Uses `cargo test` rather than `cargo nextest` so this job does
      # not require the extra `taiki-e/install-action` step the main
      # `test` job uses. Functional behavior is the same for these
      # suites — neither relies on nextest-specific isolation.
      - name: cargo test (Phase 4 gated suites)
        run: |
          cargo test \
            -p marque-engine -p marque \
            --features marque-engine/decoder-harness,marque-engine/corpus-override,marque/corpus-override

  # T029 / SC-014 — Refactor-006 PR-3b corpus regression sweep ×
  # {3a + 3b} subsequence.
  #
  # T025 (the PR-3a-only sweep above) validates 3a in isolation:
  # "did PR 3a regress?" answerable from the CI log alone, not by
  # re-bisecting through the keystone window. T029 validates the
  # 3a + 3b subsequence by running the same corpus-regression suites
  # on every 3b-prefixed branch (the umbrella + each of the six
  # sub-PR branches 3b.A–3b.F + the closeout branch). Together,
  # T025 and T029 are the SC-014 keystone subsequence verification
  # for the engine-rule-refactor PRs that have landed so far; PR 3c
  # will land its own equivalent matrix entry when its keystone
  # branch opens.
  #
  # Prefix-match `if:` filter is intentional: the umbrella naming
  # `refactor-006-pr-3b*` is namespace-clean per the project's
  # branch-naming convention, and any future 3b-followup branch is
  # in scope by construction without an explicit ci.yml edit. The
  # job body is byte-identical to T025 — same toolchain pin, same
  # cache config, same three corpus suites, same Phase 4 gated
  # invocation.
  pr-3b-corpus-regression:
    name: PR 3b corpus regression (T029)
    needs: check
    if: |
      startsWith(github.ref, 'refs/heads/refactor-006-pr-3b') ||
      startsWith(github.head_ref, 'refactor-006-pr-3b')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "nightly"

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f

      # Corpus regression tests live in `crates/{capco,engine}/tests/`
      # and `marque/tests/`. `cargo test --test` matches an exact
      # integration-test target name within ONE package; `--workspace`
      # combined with `--test` fails when the named target doesn't
      # exist in every member crate. Invoke each suite per-package
      # explicitly (Copilot review feedback on PR #315):
      #   - corpus_parity     in marque-capco
      #   - corpus_accuracy   in marque-engine
      #   - corpus_provenance in marque
      #
      # When new corpus suites land, add them here in the same shape.
      # `--features marque-engine/corpus-override` enables the SC-002
      # decoder accuracy gate that lives behind the same feature flag
      # as the corpus override audit-trail tests.
      - name: cargo test corpus regression suites
        run: |
          cargo test -p marque-capco --test corpus_parity \
            --features marque-engine/corpus-override
          cargo test -p marque-engine --test corpus_accuracy \
            --features marque-engine/corpus-override
          cargo test -p marque --test corpus_provenance \
            --features marque-engine/corpus-override

      # Phase 4 (US2) regression suites are file-level gated on
      # `decoder-harness` and `corpus-override` features that are NOT
      # in any default feature set. Without this explicit invocation
      # the SC-004 always-on regression floor (decoder_accuracy.rs)
      # and the corpus-override audit-trail invariants
      # (corpus_override.rs + cli_corpus_override.rs) are dormant.
      # Enable both features here so those non-ignored gated suites run.
      # `decoder_diagnostic.rs` is also gated on `decoder-harness`, but
      # its tests are all `#[ignore]`-marked (issue #133 root-cause
      # traces) and require an explicit `--run-ignored` invocation;
      # they intentionally do not run in this step.
      #
      # Uses `cargo test` rather than `cargo nextest` so this job does
      # not require the extra `taiki-e/install-action` step the main
      # `test` job uses. Functional behavior is the same for these
      # suites — neither relies on nextest-specific isolation.
      - name: cargo test (Phase 4 gated suites)
        run: |
          cargo test \
            -p marque-engine -p marque \
            --features marque-engine/decoder-harness,marque-engine/corpus-override,marque/corpus-override

  # T145 / SC-014 — Refactor-006 PR-4b corpus regression sweep ×
  # {3a + 3b + 4b} subsequence.
  #
  # T025 (3a) and T029 (3b) above validate each prior keystone in
  # isolation: "did 3a regress?" / "did 3b regress?" answerable from
  # the CI log alone, without re-bisecting through the keystone
  # window. T145 extends the subsequence to 4b by running the same
  # corpus-regression suites on every 4b-prefixed branch (the
  # umbrella + each of the nine sub-PR branches 4b-A / 4b-B / 4b-C /
  # 4b-D.0 / 4b-D.1 / 4b-D.2 / 4b-D.3 / 4b-E / 4b-F + the closeout
  # branch). Together, T025 / T029 / T145 are the SC-014 keystone
  # subsequence verification for the engine-rule-refactor keystone
  # PRs that have landed so far; PR 5 will land its own equivalent
  # matrix entry when its keystone branch opens.
  #
  # Prefix-match `if:` filter is intentional: the umbrella naming
  # `refactor-006-pr-4b*` is namespace-clean per the project's
  # branch-naming convention, and any future 4b-followup branch is
  # in scope by construction without an explicit ci.yml edit. The
  # job body is byte-identical to T029 — same toolchain pin, same
  # cache config, same three corpus suites, same Phase 4 gated
  # invocation.
  pr-4b-corpus-regression:
    name: PR 4b corpus regression (T145)
    needs: check
    if: |
      startsWith(github.ref, 'refs/heads/refactor-006-pr-4b') ||
      startsWith(github.head_ref, 'refactor-006-pr-4b')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "nightly"

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f

      # Corpus regression tests live in `crates/{capco,engine}/tests/`
      # and `marque/tests/`. `cargo test --test` matches an exact
      # integration-test target name within ONE package; `--workspace`
      # combined with `--test` fails when the named target doesn't
      # exist in every member crate. Invoke each suite per-package
      # explicitly (Copilot review feedback on PR #315):
      #   - corpus_parity     in marque-capco (currently dormant —
      #     `#![cfg(any())]` disabled by PR 3c.B Commit 10 pending
      #     FixProposal-shape rewrite; runs 0 tests today but kept
      #     in the invocation so this job re-activates the moment
      #     the file is re-enabled)
      #   - corpus_accuracy   in marque-engine (ACTIVE)
      #   - corpus_provenance in marque (ACTIVE)
      #   - post_4b_lattice_inventory_pin in marque-capco (T144 —
      #     PR 4b structural exact-state pin; rejects rename /
      #     reorder / swap / duplicate-label drift in PageRewrite /
      #     ClosureRule / Constraint::Custom catalogs)
      #   - lattice_static_assertions in marque-capco (T143 —
      #     compile-time pin via static_assertions; `cargo test
      #     --test` builds the file and any violated assertion is
      #     a build error)
      #   - post_3b_registration_pin in marque-capco (T028 — exact
      #     38-rule set; pre-existing, re-run alongside the new
      #     4b pins for the umbrella regression surface)
      #
      # The post_4b + lattice_static + post_3b additions close the
      # Copilot R1 finding on PR #557 that this job otherwise
      # inherits the corpus_parity dormancy hole. With four active
      # pins plus corpus_accuracy + corpus_provenance, the job has
      # real 4b-specific coverage even while corpus_parity stays
      # dormant.
      #
      # `--features marque-engine/corpus-override` enables the SC-002
      # decoder accuracy gate that lives behind the same feature flag
      # as the corpus override audit-trail tests.
      - name: cargo test corpus regression suites
        run: |
          cargo test -p marque-capco --test corpus_parity \
            --features marque-engine/corpus-override
          cargo test -p marque-engine --test corpus_accuracy \
            --features marque-engine/corpus-override
          cargo test -p marque --test corpus_provenance \
            --features marque-engine/corpus-override
          cargo test -p marque-capco --test post_4b_lattice_inventory_pin
          cargo test -p marque-capco --test lattice_static_assertions
          cargo test -p marque-capco --test post_3b_registration_pin

      # Phase 4 (US2) regression suites are file-level gated on
      # `decoder-harness` and `corpus-override` features that are NOT
      # in any default feature set. Without this explicit invocation
      # the SC-004 always-on regression floor (decoder_accuracy.rs)
      # and the corpus-override audit-trail invariants
      # (corpus_override.rs + cli_corpus_override.rs) are dormant.
      # Enable both features here so those non-ignored gated suites run.
      # `decoder_diagnostic.rs` is also gated on `decoder-harness`, but
      # its tests are all `#[ignore]`-marked (issue #133 root-cause
      # traces) and require an explicit `--run-ignored` invocation;
      # they intentionally do not run in this step.
      #
      # Uses `cargo test` rather than `cargo nextest` so this job does
      # not require the extra `taiki-e/install-action` step the main
      # `test` job uses. Functional behavior is the same for these
      # suites — neither relies on nextest-specific isolation.
      - name: cargo test (Phase 4 gated suites)
        run: |
          cargo test \
            -p marque-engine -p marque \
            --features marque-engine/decoder-harness,marque-engine/corpus-override,marque/corpus-override

  # FR-039 — masking-pin lint. AST scan over `tests/` and
  # `crates/*/tests/` that locates every `with_recognizer(...StrictRecognizer...)`
  # call site and asserts each carries either a `// MASKING-PIN: tracks #NNN`
  # comment whose tracked GitHub issue is still open, or a
  # `// INTENTIONAL-STRICT: <reason>` comment, within 5 lines of the
  # method-ident position. Decision D11 in
  # `specs/006-engine-rule-refactor/decisions.md` defines the
  # cache-with-fallback design — the daily refresh-cache workflow
  # (`.github/workflows/masking-pin-cache-refresh.yml`) keeps
  # `tools/masking-pin-lint/cache/` current; this CI job runs in
  # `--mode ci` which queries the GitHub API and falls back to the
  # cached state when the API is unreachable or rate-limited.
  masking-pin-lint:
    name: Masking-pin lint (FR-039)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f
        with:
          workspaces: tools/masking-pin-lint

      # `--release` matters: the lint crate pulls a non-trivial dep tree
      # (octocrab → reqwest/tokio); release builds run faster and match
      # the daily cache-refresh workflow. `GITHUB_TOKEN` is the
      # ephemeral read-only token GitHub injects on every PR build; the
      # lint crate reads it via the `--github-token` flag's
      # `env = "GITHUB_TOKEN"` fallback.
      - name: Run masking-pin lint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo run --manifest-path tools/masking-pin-lint/Cargo.toml --release -- \
              --workspace-dir . --mode ci

  # FR-040 + decision D12 — promote-callsite lint. AST scan that asserts
  # every production-code call site of `AppliedFix::__engine_promote`
  # lives inside `Engine::fix_inner` (Constitution V invariant: only the
  # engine may promote a `FixProposal` to an `AppliedFix`). Test code is
  # exempt under the test-fixture carve-out; the lint encodes that
  # exemption per D12.
  promote-callsite-lint:
    name: Promote-callsite lint (FR-040 + D12)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f
        with:
          workspaces: tools/promote-callsite-lint

      - name: Run promote-callsite lint
        run: |
          cargo run --manifest-path tools/promote-callsite-lint/Cargo.toml --release -- \
              --workspace-dir . --all

  # FR-018 — citation-lint. AST scan over `crates/*/src/**/*.rs` that
  # extracts every `§X.Y pNN` reference (in `citation:`/`message:`/
  # `constraint_label:` struct fields, doc-comment attributes, and
  # generic string literals containing `§`) and validates each
  # against `crates/capco/docs/CAPCO-2016.md`. Defects include bare
  # `§NN` forms, non-normative-section citations (§I/§J/§K), page
  # anchors outside the cited subsection's span, the FR-020 doubled-
  # page-anchor pattern, and the retired `line NNNN` form.
  #
  # PR 0.5 landed the lint and the defect catalog at
  # `docs/refactor-006/citation-defect-catalog.md`. PR 3c.B commit 1
  # cleared all 14 lint-detectable defects from the catalog
  # (8 legacy-line-form + 6 bare-section in
  # `crates/capco/src/{rules.rs, rules_declarative.rs, scheme.rs}`).
  # The same commit also corrected the E011/E012/E015 wrapper-
  # vs-catalog citation drift per
  # `decisions/04-citation-hygiene.md` — those are semantic defects
  # caught by `rule-body-audit.md`, not by the structural lint
  # (which validates page-anchor / subsection-span integrity, not
  # passage-text fidelity). From this commit forward the job is
  # hard-blocking on the structural lint: any new citation defect
  # fails CI immediately.
  citation-lint:
    name: Citation lint (FR-018)
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f
        with:
          workspaces: tools/citation-lint

      - name: Run citation lint
        # Hard CI gate. Any defect cataloged at
        # `docs/refactor-006/citation-defect-catalog.md` fails the job;
        # the placeholder "no defects" form is the green-state
        # invariant. Constitution Principle VIII (Authoritative Source
        # Fidelity) treats fabricated, hallucinated, misattributed, or
        # silently-drifted citations as correctness defects of the
        # same severity as a wrong predicate — this gate prevents
        # them from accreting silently.
        run: |
          cargo run --manifest-path tools/citation-lint/Cargo.toml --release -- \
              "$GITHUB_WORKSPACE"

  # FR-051 / decision D16 — flake-watch cap check. Counts active
  # `## flake-NNN` headers in `tools/flake-watch/issues.md` and fails
  # the workflow when the count exceeds 10. The template entry uses a
  # blockquote (`> ##`) so it does not count; see
  # `tools/flake-watch/README.md` for the full convention. Shell-only
  # by design (no Rust toolchain needed).
  flake-watch-cap:
    name: flake-watch cap (FR-051 / D16)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      # `|| true` handles the zero-match case — `grep -c` exits 1 when
      # nothing matches, which would otherwise fail the step before the
      # cap comparison runs.
      - name: Cap check
        run: |
          count=$(grep -c '^## flake-' tools/flake-watch/issues.md || true)
          echo "flake-watch active count: $count / 10"
          if [ "$count" -gt 10 ]; then
            echo "::error::flake-watch queue exceeds cap of 10 (count=$count) per D16"
            exit 1
          fi

  # FR-015 / CHK030 — regression-grep guards. Pattern-anchored guards
  # against forbidden source-code shapes that PR 2 (and future PRs)
  # migrated to documented vocabulary surfaces. Currently enforces:
  #   - no inline `is_ascii_alphanumeric()` in `crates/core/src/parser.rs`
  #     (PR 2 routed admission through `Vocabulary<S>::shape_admits` and
  #     the lifted `marque-ism` predicates).
  # See `tools/regression-grep/README.md` for the active guard list and
  # the contract for adding a new guard.
  # Shell-only by design (no Rust toolchain needed); also runnable
  # locally via `./tools/regression-grep/regression-grep.sh`.
  regression-grep:
    name: regression-grep (FR-015 / CHK030)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Run regression-grep guards
        run: ./tools/regression-grep/regression-grep.sh

  wasm:
    name: WASM build
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f

      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa

      - name: wasm-pack build
        # we use profiling profile as an intermediate step to sidestep wasm-pack issues
        run: wasm-pack build crates/wasm --target web --profiling

      # T088 — WASM-target SC-008 parity gate.
      #
      # `tests/native_parity.rs` proves `Engine::lint == lint_native` on
      # the host target; this step proves `lint_native (host) ==
      # lint_native (wasm32-unknown-unknown)` by re-running the parity
      # corpus inside Node's WASM runtime. Sync of the baked artifact
      # is enforced by `tests/parity_sync_check.rs`, which the regular
      # `cargo nextest` job already runs — so a corpus or engine drift
      # fails there with a clear regen message before this step
      # executes. Node is preinstalled on `ubuntu-latest`.
      - name: wasm-pack test --node (parity)
        run: wasm-pack test --node crates/wasm --test parity

      # PR 3d.3 — WASM binary-size regression gate (T058i quality
      # gate, Constitution III). Runs a SEPARATE `wasm-pack build
      # --profile release-web` invocation and compares the resulting
      # pre-`wasm-opt` artifact size to
      # `tools/wasm-size-baseline.txt`. Fails if the size regressed
      # by more than 5%. Adds ~30 seconds to the wasm job (acceptable
      # for the catch-rust-side-bloat property the gate provides).
      #
      # Profile note: this build uses `release-web`, while the
      # parity build and ship artifact use `--profiling` +
      # `wasm-opt`. See `tools/wasm-size-check.sh` header comment
      # for why measurement happens at the pre-opt boundary.
      # The `MARQUE_WASM_SKIP_REGRESSION` env-var skip is enabled
      # exclusively for the `refactor-006-pr-4b-perf-closeout`
      # diagnosis branch, where the cumulative WASM regression is
      # the deliverable rather than a defect. Build failures,
      # absolute-ceiling violations, and missing-artifact failures
      # still fail; only the +5% drift gate is skipped. The match
      # covers both `push` events (`github.ref`) and `pull_request`
      # events (`github.head_ref`), mirroring the existing
      # branch-gate patterns at lines 84, 166, 249 of this file —
      # on `pull_request` events `github.ref` is `refs/pull/N/merge`,
      # not the source branch, so without the `head_ref` arm the
      # skip would silently fail to fire on PR runs. REMOVE this
      # env block once the diagnosis branch merges and the
      # remediation-lane PRs land their baseline updates. See
      # `docs/plans/2026-05-19-pr4b-perf-pm-decisions.md` D-3.
      - name: wasm-size-check (release-web profile)
        env:
          MARQUE_WASM_SKIP_REGRESSION: ${{ (github.ref == 'refs/heads/refactor-006-pr-4b-perf-closeout' || github.head_ref == 'refactor-006-pr-4b-perf-closeout') && '1' || '' }}
        run: ./tools/wasm-size-check.sh

      - uses: NiklasEi/wasm-opt-action@379437a7e494484c2c9af2c6280407c967dc2c3c
        with:
          file: crates/wasm/pkg/*.wasm
          options: >-
            --enable-bulk-memory-opt
            --enable-bulk-memory
            --enable-extended-const
            --enable-multivalue
            --enable-nontrapping-float-to-int
            --enable-reference-types
            --enable-sign-ext
            --enable-simd
            --enable-tail-call
            --type-refining-gufa
            --generate-global-effects
            -O3
            --monomorphize
            --precompute-propagate
            --low-memory-unused
            --gufa
            --vacuum
            -O3
            --converge
            --strip-toolchain-annotations


  deny:
    name: Supply chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: EmbarkStudios/cargo-deny-action@f28dad79a1c0736fb9bef3766fec993bb67416c5

  # Whitepaper §8.5 / gap register #14 — the Constitution v1.2.0
  # dependency-hygiene rule must hold independently for the WASM-safe
  # subgraph even if the workspace-wide allow-list relaxes in the
  # future. `deny.wasm-safe.toml` encodes the stricter (no copyleft,
  # no competing source-available) allow-list. The `--exclude` list
  # explicitly names every non-WASM-safe workspace member — cargo-deny
  # treats every unexcluded workspace member as a crate-graph root,
  # so a missing entry leaks a non-WASM-safe crate's dep tree into
  # the check. `--exclude-dev` drops test-only deps (`marque-capco`'s
  # dev-dep on `marque-engine` otherwise pulls the engine tree in).
  #
  # When a new workspace member lands it MUST be classified here:
  # either added to the `--exclude` list (non-WASM-safe) or left in
  # the check (WASM-safe, and treat any failure as a real posture
  # violation, not a CI config bug).
  #
  # Runs cargo-deny via a shell step so the full global-option
  # surface (`--exclude`, `--exclude-dev`, then `check --config`) is
  # available — the canned `cargo-deny-action` wrapper doesn't
  # thread pre-subcommand flags cleanly.
  deny-wasm-safe:
    name: Supply chain audit (WASM-safe subgraph)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      # cargo-deny shells out to `cargo metadata` to resolve the
      # workspace graph, which requires a cargo binary that
      # understands the edition / rust-version pinned in Cargo.toml
      # (edition 2024, rust-version 1.85). The ubuntu-latest runner
      # ships a preinstalled Rust toolchain but its version is a
      # moving target — pin the same 1.89 used by every other cargo
      # job in this workflow so CI stays deterministic.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: taiki-e/install-action@711e1c3275189d76dcc4d34ddea63bf96ac49090
        with:
          tool: cargo-deny

      - name: cargo deny (WASM-safe subgraph)
        run: |
          cargo deny \
            --exclude-dev \
            --exclude marque \
            --exclude marque-config \
            --exclude marque-engine \
            --exclude marque-extract \
            --exclude marque-server \
            --exclude marque-test-utils \
            --exclude marque-wasm \
            check \
            --config deny.wasm-safe.toml \
            licenses bans sources

  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      # pipx is pre-installed on ubuntu-latest and keeps `reuse` isolated
      # from any system Python packages. Avoids pulling an external
      # action into the supply chain for a single lint pass.
      #
      # The version is pinned so a PyPI release cannot cause a
      # non-deterministic CI failure or silently change the lint
      # behavior. Bumps are intentional: update the version here, run
      # `reuse lint` locally against the new release, commit the result.
      - name: Install reuse
        run: pipx install "reuse==5.0.2"

      - name: reuse lint
        run: reuse lint

  refs-integrity:
    name: Vendored reference integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      # Gap register #11 / whitepaper §7.3 — SHA256 checksums on the
      # vendored authoritative references (CAPCO PDFs) so any silent
      # replacement trips CI. PDFs are the citation primary source per
      # Principle VIII. Hash bumps are intentional edits to the
      # SHA256SUMS file.
      #
      # ODNI ISM schemas are no longer vendored here; they ship via the
      # `ism` and `ism-ismcat` build-dependencies from
      # https://github.com/marquetools/ism-data, whose own crate-level
      # build.rs scripts re-hash every file under data/ against the
      # baked SHA-256 manifest at every consumer compile. The integrity
      # check fires automatically as part of `cargo check` above.
      - name: Verify CAPCO original references
        run: |
          cd crates/capco/docs/original-refs
          sha256sum -c SHA256SUMS

  coverage:
    name: Coverage
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      # Coverage runs on nightly so that the existing
      # `#[cfg_attr(coverage_nightly, coverage(off))]` annotations on
      # `mod tests { ... }` blocks across the workspace activate. The
      # annotations require `#![feature(coverage_attribute)]` (set at
      # crate root via `#![cfg_attr(coverage_nightly, feature(...))]`),
      # which is nightly-only on stable Rust 1.85+. Without nightly +
      # the cfg flag below, every `mod tests` block lands in coverage
      # data with hundreds of `assert!`-message-continuation lines
      # marked as missed — pure tooling noise that gates `codecov/
      # patch` on PRs without measuring real coverage.
      #
      # The other CI jobs (build, test, clippy, etc.) stay pinned to
      # the stable Rust toolchain in `rust-toolchain.toml`. Nightly
      # appears here ONLY for coverage instrumentation.
      #
      # **Toolchain-override discipline.** The workspace ships a
      # `rust-toolchain.toml` at the repo root that pins
      # `channel = "1.89"`. rustup respects that file automatically,
      # so even after `dtolnay/rust-toolchain` installs nightly,
      # plain `cargo` invocations from inside the workspace would
      # still resolve to stable 1.89 (and stable rejects the
      # `feature(coverage_attribute)` gate with E0554). The fix is to
      # invoke cargo with the `+nightly` channel-prefix below, which
      # is a hard rustup-level override that beats the file pin.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "nightly"

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f

      - uses: taiki-e/install-action@711e1c3275189d76dcc4d34ddea63bf96ac49090
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage
        # `--cfg coverage_nightly` activates the source-tree
        # `#[cfg_attr(coverage_nightly, coverage(off))]` markers on
        # `mod tests` blocks (≈30 sites across the workspace) so test
        # functions and their `assert!` continuations don't pollute
        # the coverage report. cargo-llvm-cov merges this RUSTFLAGS
        # value with its own instrumentation flags rather than
        # overriding it.
        #
        # `cargo +nightly` (note the `+` prefix) forces the nightly
        # toolchain even though `rust-toolchain.toml` pins 1.89 at
        # the workspace level. Without `+nightly`, rustup resolves
        # the toolchain from the file and stable 1.89 fails with
        # E0554 on the `feature(coverage_attribute)` gate.
        env:
          RUSTFLAGS: "--cfg coverage_nightly"
        run: cargo +nightly llvm-cov --workspace --codecov --output-path codecov.json

      - name: Upload to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          files: codecov.json
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Whitepaper §3.2 / Constitution II / gap register #15 — hot-path
  # heap-allocation regression gate. Installs a counting global
  # allocator (`crates/core/tests/alloc_budget.rs`) and asserts
  # `Scanner::scan(...)` does not exceed a small allocation budget on
  # a representative corpus sweep.
  #
  # `--test-threads=1` is load-bearing — the counter is process-wide,
  # so parallel tests inflate each other's deltas. The header comment
  # in `alloc_budget.rs` covers why.
  #
  # Decoupled from the `test` job so a routine test failure doesn't
  # mask an alloc-budget regression and vice versa. `needs: check`
  # remains — there's no point running the alloc gate against a tree
  # whose formatting / clippy / typos pass already failed, and the
  # `test` job sits behind the same gate, so this matches the cost
  # structure of every other test-adjacent job in this workflow.
  count-allocs:
    name: Hot-path alloc budget
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f

      - name: cargo test (alloc-budget gate)
        run: |
          cargo test -p marque-core \
            --features count-allocs \
            --test alloc_budget \
            -- --test-threads=1

  # Constitution Principle I + SC-001 / SC-002 / SC-005 + Spec 005 — performance
  # regression gates. Runs `scripts/bench-check.sh`, which executes:
  #   - `lint_10kb` (SC-001 strict-path: Criterion mean-runtime upper CI ≤ 16ms)
  #   - `decoder_10kb_one_mangled_region` (SC-002 decoder-path: Criterion mean-runtime upper CI ≤ 18ms)
  #   - `lint_scaling` (SC-005 linear-scaling R² ≥ 0.9 across input-size sweep)
  #   - `deadline_overhead` (Spec 005 T018/T019: with-deadline-vs-no-deadline
  #     overhead ratio under `deadline_overhead.max_ratio_pct` from
  #     `benches/baseline.json`)
  # The constitution wording uses "p95"; the bench harness implements that
  # commitment as a confidence-interval upper bound around the mean, which
  # is what Criterion's `time: [lower mean upper]` triple measures (a CI of
  # the mean, not a sample percentile). All thresholds live in
  # `benches/baseline.json`.
  #
  # Decoupled from `count-allocs` for the same reason that job is decoupled
  # from `test`: a routine bench-noise blip should not be conflated with a
  # routine alloc-budget regression. `needs: check` for the same fail-fast
  # reason every other test-adjacent job has it.
  #
  # Benches use the cargo `bench` profile (release + debuginfo). On the
  # ubuntu-latest runner a full sweep of four benches takes ~7–11 minutes
  # warm — well under the routine job timeout. The runner is shared and
  # noisy compared to a dedicated reference machine, which is exactly why
  # `bench-check.sh` enforces both a +10% regression bound AND an absolute
  # target — either alone would be too tight or too loose for a CI runner.
  bench-check:
    name: Performance regression gates
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f

      # The `MARQUE_BENCH_SKIP_REGRESSION` env-var skip is enabled
      # exclusively for the `refactor-006-pr-4b-perf-closeout`
      # diagnosis branch, where the cumulative perf regression is
      # the deliverable rather than a defect. Absolute SC-001 16ms
      # ceiling, SC-002 18ms ceiling, SC-005 R² gate, fix-throughput
      # R² gate, and deadline-overhead gate are still enforced (per
      # `scripts/bench-check.sh` policy comment at line 31). The
      # match covers both `push` events (`github.ref`) and
      # `pull_request` events (`github.head_ref`), mirroring the
      # existing branch-gate patterns at lines 84, 166, 249 — on
      # `pull_request` events `github.ref` is `refs/pull/N/merge`,
      # not the source branch, so without the `head_ref` arm the
      # skip would silently fail to fire on PR runs. REMOVE this
      # env block once the diagnosis branch merges and the
      # remediation-lane PRs land their baseline updates. See
      # `docs/plans/2026-05-19-pr4b-perf-pm-decisions.md` D-3.
      - name: scripts/bench-check.sh
        env:
          MARQUE_BENCH_SKIP_REGRESSION: ${{ (github.ref == 'refs/heads/refactor-006-pr-4b-perf-closeout' || github.head_ref == 'refactor-006-pr-4b-perf-closeout') && '1' || '' }}
        run: bash scripts/bench-check.sh
