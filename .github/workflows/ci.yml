name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Format + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "nightly"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f

      - name: cargo fmt
        run: cargo fmt --check

      - name: typos
        uses: crate-ci/typos@cf5f1c29a8ac336af8568821ec41919923b05a83

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f

      - uses: taiki-e/install-action@fb7e96410651361cf247a4f26ea3153ea90f086b
        with:
          tool: cargo-nextest

      - name: cargo nextest
        run: cargo nextest run --workspace --profile ci

      # Phase 4 (US2) regression suites are file-level gated on
      # `decoder-harness` and `corpus-override` features that are NOT
      # in any default feature set. Without this explicit invocation
      # the SC-004 always-on regression floor (decoder_accuracy.rs)
      # and the corpus-override audit-trail invariants
      # (corpus_override.rs + cli_corpus_override.rs) are dormant.
      # Enable both features here so those non-ignored gated suites run.
      # `decoder_diagnostic.rs` is also gated on `decoder-harness`, but
      # its tests are all `#[ignore]`-marked (issue #133 root-cause
      # traces) and require an explicit `--run-ignored` invocation;
      # they intentionally do not run in this step.
      - name: cargo nextest (Phase 4 gated suites)
        run: |
          cargo nextest run --profile ci \
            -p marque-engine -p marque \
            --features marque-engine/decoder-harness,marque-engine/corpus-override,marque/corpus-override

  wasm:
    name: WASM build
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f

      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa

      - name: wasm-pack build
        run: wasm-pack build crates/wasm --target web --release
      
      - uses: NiklasEi/wasm-opt-action@379437a7e494484c2c9af2c6280407c967dc2c3c
        with:
          file: crates/wasm/pkg/*.wasm
          options: >-
            --enable-bulk-memory-opt
            --enable-bulk-memory
            --enable-extended-const
            --enable-gc
            --enable-multi-value
            --enable-mutable-globals
            --enable-nontrapping-float-to-int
            --enable-reference-types
            --enable-sign-ext
            --enable-simd
            --enable-tail-call
            --enable-threads
            --enable-typed-function-references
            --type-refining-gufa
            --generate-global-effects
            -O3
            --monomorphize
            --precompute-propagate
            --low-memory-unused
            --gufa
            -O3
            --converge
            --strip-toolchain-annotations


  deny:
    name: Supply chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: EmbarkStudios/cargo-deny-action@f28dad79a1c0736fb9bef3766fec993bb67416c5

  # Whitepaper §8.5 / gap register #14 — the Constitution v1.2.0
  # dependency-hygiene rule must hold independently for the WASM-safe
  # subgraph even if the workspace-wide allow-list relaxes in the
  # future. `deny.wasm-safe.toml` encodes the stricter (no copyleft,
  # no competing source-available) allow-list. The `--exclude` list
  # explicitly names every non-WASM-safe workspace member — cargo-deny
  # treats every unexcluded workspace member as a crate-graph root,
  # so a missing entry leaks a non-WASM-safe crate's dep tree into
  # the check. `--exclude-dev` drops test-only deps (`marque-capco`'s
  # dev-dep on `marque-engine` otherwise pulls the engine tree in).
  #
  # When a new workspace member lands it MUST be classified here:
  # either added to the `--exclude` list (non-WASM-safe) or left in
  # the check (WASM-safe, and treat any failure as a real posture
  # violation, not a CI config bug).
  #
  # Runs cargo-deny via a shell step so the full global-option
  # surface (`--exclude`, `--exclude-dev`, then `check --config`) is
  # available — the canned `cargo-deny-action` wrapper doesn't
  # thread pre-subcommand flags cleanly.
  deny-wasm-safe:
    name: Supply chain audit (WASM-safe subgraph)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      # cargo-deny shells out to `cargo metadata` to resolve the
      # workspace graph, which requires a cargo binary that
      # understands the edition / rust-version pinned in Cargo.toml
      # (edition 2024, rust-version 1.85). The ubuntu-latest runner
      # ships a preinstalled Rust toolchain but its version is a
      # moving target — pin the same 1.89 used by every other cargo
      # job in this workflow so CI stays deterministic.
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: taiki-e/install-action@fb7e96410651361cf247a4f26ea3153ea90f086b
        with:
          tool: cargo-deny

      - name: cargo deny (WASM-safe subgraph)
        run: |
          cargo deny \
            --exclude-dev \
            --exclude marque \
            --exclude marque-config \
            --exclude marque-engine \
            --exclude marque-extract \
            --exclude marque-server \
            --exclude marque-test-utils \
            --exclude marque-wasm \
            check \
            --config deny.wasm-safe.toml \
            licenses bans sources

  reuse:
    name: REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      # pipx is pre-installed on ubuntu-latest and keeps `reuse` isolated
      # from any system Python packages. Avoids pulling an external
      # action into the supply chain for a single lint pass.
      #
      # The version is pinned so a PyPI release cannot cause a
      # non-deterministic CI failure or silently change the lint
      # behavior. Bumps are intentional: update the version here, run
      # `reuse lint` locally against the new release, commit the result.
      - name: Install reuse
        run: pipx install "reuse==5.0.2"

      - name: reuse lint
        run: reuse lint

  refs-integrity:
    name: Vendored reference integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      # Gap register #11 / whitepaper §7.3 — SHA256 checksums on the
      # vendored authoritative references (CAPCO PDFs, ODNI ISM schema
      # tree) so any silent replacement trips CI. Schemas are consumed
      # by `crates/ism/build.rs`; PDFs are the citation primary source
      # per Principle VIII. Hash bumps are intentional edits to the
      # SHA256SUMS file.
      - name: Verify CAPCO original references
        run: |
          cd crates/capco/docs/original-refs
          sha256sum -c SHA256SUMS

      - name: Verify ISM-v2022-DEC schemas
        run: |
          cd crates/ism/schemas/ISM-v2022-DEC
          sha256sum -c SHA256SUMS

  coverage:
    name: Coverage
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f

      - uses: taiki-e/install-action@fb7e96410651361cf247a4f26ea3153ea90f086b
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --workspace --codecov --output-path codecov.json

      - name: Upload to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          files: codecov.json
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # Whitepaper §3.2 / Constitution II / gap register #15 — hot-path
  # heap-allocation regression gate. Installs a counting global
  # allocator (`crates/core/tests/alloc_budget.rs`) and asserts
  # `Scanner::scan(...)` does not exceed a small allocation budget on
  # a representative corpus sweep.
  #
  # `--test-threads=1` is load-bearing — the counter is process-wide,
  # so parallel tests inflate each other's deltas. The header comment
  # in `alloc_budget.rs` covers why.
  #
  # Decoupled from the `test` job so a routine test failure doesn't
  # mask an alloc-budget regression and vice versa. `needs: check`
  # remains — there's no point running the alloc gate against a tree
  # whose formatting / clippy / typos pass already failed, and the
  # `test` job sits behind the same gate, so this matches the cost
  # structure of every other test-adjacent job in this workflow.
  count-allocs:
    name: Hot-path alloc budget
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f

      - name: cargo test (alloc-budget gate)
        run: |
          cargo test -p marque-core \
            --features count-allocs \
            --test alloc_budget \
            -- --test-threads=1

  # Constitution Principle I + SC-001 / SC-002 / SC-005 — performance
  # regression gates. Runs `scripts/bench-check.sh`, which executes:
  #   - `lint_10kb` (SC-001 strict-path p95 ≤ 16ms upper CI)
  #   - `decoder_10kb_one_mangled_region` (SC-002 decoder-path p95 ≤ 18ms upper CI)
  #   - `lint_scaling` (SC-005 linear-scaling R² ≥ 0.9 across input-size sweep)
  # All thresholds live in `benches/baseline.json` and are checked against
  # Criterion's reported `time:` lines.
  #
  # Decoupled from `count-allocs` for the same reason that job is decoupled
  # from `test`: a routine bench-noise blip should not be conflated with a
  # routine alloc-budget regression. `needs: check` for the same fail-fast
  # reason every other test-adjacent job has it.
  #
  # Benches use the cargo `bench` profile (release + debuginfo). On the
  # ubuntu-latest runner a full sweep of three benches takes ~5–8 minutes
  # warm — well under the routine job timeout. The runner is shared and
  # noisy compared to a dedicated reference machine, which is exactly why
  # `bench-check.sh` enforces both a +10% regression bound AND an absolute
  # target — either alone would be too tight or too loose for a CI runner.
  bench-check:
    name: Performance regression gates
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f

      - name: scripts/bench-check.sh
        run: bash scripts/bench-check.sh
