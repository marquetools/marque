name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: Format + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@ed5e89b8ff3145597af131187c6118e451e2ed12

      - name: cargo fmt
        run: cargo fmt --check

      - name: typos
        uses: crate-ci/typos@cf5f1c29a8ac336af8568821ec41919923b05a83

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@ed5e89b8ff3145597af131187c6118e451e2ed12

      - uses: taiki-e/install-action@b2022afd587ede019f0fcaa03f8fbdbe6c33f2fd
        with:
          tool: cargo-nextest

      - name: cargo nextest
        run: cargo nextest run --workspace --profile ci

  wasm:
    name: WASM build
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@ed5e89b8ff3145597af131187c6118e451e2ed12

      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa

      - name: wasm-pack build
        run: wasm-pack build crates/marque-wasm --target web --release
      
      - uses: NiklasEi/wasm-opt-action@379437a7e494484c2c9af2c6280407c967dc2c3c
        with:
          files: crates/marque-wasm/pkg/*.wasm
          options: >-
            --enable-bulk-memory-opt
            --enable-bulk-memory
            --enable-extended-const
            --enable-gc
            --enable-multi-value
            --enable-mutable-globals
            --enable-nontrapping-float-to-int
            --enable-reference-types
            --enable-sign-ext
            --enable-simd
            --enable-tail-call
            --enable-threads
            --enable-typed-function-references
            --type-refining-gufa
            --generate-global-effects
            -O3
            --monomorphize
            --precompute-propagate
            --low-memory-unused
            --gufa
            -O3
            --converge
            --strip-toolchain-annotations


  deny:
    name: Supply chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: EmbarkStudios/cargo-deny-action@e4d1338c831d83e48d4819302ab6f7932b19bf76

  coverage:
    name: Coverage
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@ed5e89b8ff3145597af131187c6118e451e2ed12

      - uses: taiki-e/install-action@b2022afd587ede019f0fcaa03f8fbdbe6c33f2fd
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          files: lcov.info
          fail_ci_if_error: false`
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
