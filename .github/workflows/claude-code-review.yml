name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    paths:
      - ".github/workflows/*"
      - "docs/security/**"
      - "docs/plans/**"
      - "crates/**"
      - "tools/**"
      - "marque/**"
      - "docs-site/**"
      - "Cargo.toml"
      - "deny.toml"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 2
      - name: Setup environment
        uses: jdx/mise-action@5ad13376e30bbca3721f7f33f25bc0baff52c02d
        with:
          install: true
          install_args: bun
          experimental: true
          cache: true
          reshim: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@6ee201f0231fbb762d22664f12aad2e7ae0401ae
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: |
            https://github.com/anthropics/claude-code.git
            https://github.com/knitli/toolshed.git
            tools/capco-validators
          plugins: |
            code-review@claude-code-plugins
            strip-ansi@toolshed
            capco-validators@capco-validators-dev
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}"
          use_commit_signing: true
          allowed_bots: "gemini[bot],jules[bot],copilot[bot],depedabot[bot],claude[bot]"
          assignee_trigger: claude
