# NPM Publish workflow with SLSA Build L3 provenance attestation.
# Supply chain audit finding C2: without automated publishing with provenance,
# there is no guarantee that published packages were built from this repository.
#
# Provenance attestation (--provenance) uses GitHub Actions OIDC to prove:
#   - The package was built from a specific commit in this repository
#   - The build was triggered by a specific workflow run
#   - No manual tampering occurred between source and published artifact
#
# Prerequisites:
#   - NPM_TOKEN secret must be configured with publish access to @marque scope
#   - The npm account must have 2FA enabled (required for scoped packages)
#   - The GitHub Actions OIDC provider must be trusted by npm

name: Publish npm package

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (no publish)"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write  # Required for npm provenance (OIDC token exchange)

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  build-and-publish:
    name: Build & Publish @marque/marque-demo
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@469cb0e24707e1f169c4501c23d77da83a83fce8

      - uses: jetli/wasm-pack-action@0d096b08b4e5a7de8c28de67e11e945404e9eefa

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # ── Build WASM module ─────────────────────────────────────────
      - name: Build WASM
        run: wasm-pack build crates/wasm --target web --release

      # ── Copy WASM artifacts into demo ─────────────────────────────
      - name: Stage WASM artifacts
        run: |
          mkdir -p demo/wasm
          cp crates/wasm/pkg/marque_wasm_bg.wasm demo/wasm/
          cp crates/wasm/pkg/marque_wasm.js demo/wasm/

      # ── Install demo dependencies & bundle vendor JS ──────────────
      - name: Install dependencies
        working-directory: demo
        run: npm ci

      - name: Bundle vendor
        working-directory: demo
        run: npm run bundle

      # ── Publish with provenance ───────────────────────────────────
      - name: Publish to npm
        working-directory: demo
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "Dry run — validating package contents:"
            npm pack --dry-run
            echo ""
            echo "Would publish with: npm publish --provenance --access public"
          else
            npm publish --provenance --access public
          fi
