# Daily refresh of `tools/masking-pin-lint/cache/`. Decision D11 in
# `specs/006-engine-rule-refactor/decisions.md` documents the
# cache-with-fallback strategy: the masking-pin lint prefers the
# committed cache to avoid hammering the GitHub API on every PR build,
# and falls back to a live probe when the cache is missing or stale.
# This scheduled workflow refreshes the cache once a day and opens a
# pull request when the on-disk state changes — direct bot pushes to
# protected branches are disallowed, so the PR pattern is the auditable
# path that works under any branch protection.

name: masking-pin cache refresh

on:
  schedule:
    - cron: "0 3 * * *"      # Daily 03:00 UTC; documented in tools/masking-pin-lint/README.md
  workflow_dispatch:           # Allow manual refresh

permissions:
  contents: write              # Required to commit the refreshed cache
  pull-requests: write         # Required to open the cache-refresh PR (we don't push directly to main/staging)

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: masking-pin-cache-refresh
  cancel-in-progress: false    # Don't cancel an in-flight refresh

jobs:
  refresh:
    name: Refresh masking-pin cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@3d9a6aef83b697b1d758490972e37a033aee461f
        with:
          workspaces: tools/masking-pin-lint

      - name: Refresh cache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo run --manifest-path tools/masking-pin-lint/Cargo.toml --release -- \
              --workspace-dir . --mode refresh-cache

      - name: Detect cache changes
        id: changes
        # `git status --porcelain` reports both modifications to tracked
        # files AND untracked files under the path argument. `git diff
        # --quiet` would only catch the former — when a brand-new
        # MASKING-PIN issue number first appears and refresh-cache
        # creates a fresh `<owner>__<repo>__<NNN>.json` for it, the
        # file is untracked and `git diff` silently returns success,
        # so the PR-open step would never fire. Using `git status` here
        # makes new-cache-file additions trigger the PR alongside
        # tracked-file edits.
        run: |
          if [ -z "$(git status --porcelain tools/masking-pin-lint/cache/)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # peter-evans/create-pull-request v7.0.5 commit SHA. Pinned per the
      # repo-wide policy that every third-party action carry a 40-char
      # commit pin so a tag-rewrite cannot silently change the action
      # body. Bumps are intentional: update the SHA, run the workflow
      # via workflow_dispatch, verify the resulting PR.
      - name: Open cache-refresh PR
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@67ccf781d68cd99b580ae25a5c18a1cc84ffff1f
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/masking-pin-cache-refresh
          commit-message: "chore(masking-pin-cache): scheduled refresh"
          title: "chore(masking-pin-cache): scheduled refresh"
          body: |
            Automated daily refresh of `tools/masking-pin-lint/cache/`.
            Per decision D11 in `specs/006-engine-rule-refactor/decisions.md`,
            this PR keeps the cache-with-fallback strategy current.
            Auto-generated by `.github/workflows/masking-pin-cache-refresh.yml`.
