# Weekly fix_latency time series. Runs `scripts/bench-check.sh` (which
# includes the advisory `report_fix_latency` step that benches three
# functions in `crates/engine/benches/fix_latency.rs`), parses the three
# `bench-check[fix_latency]:` lines, and posts a comment to the tracking
# issue (marquetools/marque#268).
#
# Cadence: Mondays at 13:17 UTC. The off-the-hour minute (`17` not `0`)
# follows the same fleet-pile-up convention bench-check.sh and the
# constitution's bench guidance call out.
#
# Hardware: `ubuntu-latest` — same runner class as the gated `bench-check`
# job in ci.yml, so the per-fix numbers are comparable to the SC-001 /
# SC-002 baselines in `benches/baseline.json`.
#
# Advisory — never fails the build for noise. If the bench crashes hard,
# the workflow fails and no comment is posted; that's a visible signal in
# the Actions tab without polluting the tracking issue with bogus numbers.

name: Weekly fix_latency time series

on:
  schedule:
    - cron: "17 13 * * 1"
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  fix-latency:
    name: Run fix_latency bench and post to #268
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: "1.89"

      - uses: Swatinem/rust-cache@65012b490220f477f20ab979e35ae732e6de4e68

      - name: scripts/bench-check.sh (capture full output)
        run: |
          set -o pipefail
          bash scripts/bench-check.sh | tee bench-output.log

      - name: Parse fix_latency lines and post comment to #268
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 <<'PY'
          import os
          import re
          import subprocess
          import sys

          with open("bench-output.log") as f:
              text = f.read()

          # Capture the three advisory lines emitted by report_fix_latency
          # in scripts/bench-check.sh.
          pat = re.compile(
              r"bench-check\[fix_latency\]:\s+"
              r"(fix_single_e001_apply|fix_single_e001_dry_run|lint_single_e001_baseline):"
              r".*"
          )
          lines_by_name = {m.group(1): m.group(0) for m in pat.finditer(text)}

          expected_names = {
              "fix_single_e001_apply",
              "fix_single_e001_dry_run",
              "lint_single_e001_baseline",
          }
          missing = expected_names - lines_by_name.keys()
          if missing:
              sys.stderr.write(
                  f"expected {len(expected_names)} fix_latency bench lines but missing: {sorted(missing)}\n"
                  "bench-check output follows:\n"
              )
              sys.stderr.write(text)
              sys.exit(1)

          # Preserve canonical bench order in the comment.
          lines = [lines_by_name[n] for n in sorted(expected_names)]

          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ.get("GITHUB_SHA", "unknown")
          run_id = os.environ.get("GITHUB_RUN_ID", "unknown")
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}"

          body = (
              "### Weekly fix_latency snapshot\n\n"
              f"- **Commit**: `{sha}`\n"
              f"- **Run**: {run_url}\n"
              "- **Hardware**: `ubuntu-latest` GitHub Actions runner\n\n"
              "```\n"
              + "\n".join(lines)
              + "\n```\n"
          )

          with open("comment-body.md", "w") as f:
              f.write(body)

          subprocess.run(
              [
                  "gh", "issue", "comment", "268",
                  "--repo", repo,
                  "--body-file", "comment-body.md",
              ],
              check=True,
          )
          PY
