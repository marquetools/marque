name: "🔀 Gemini Dispatch"

on:
  pull_request_review_comment: { types: [ created ] }
  pull_request_review: { types: [ submitted ] }
  pull_request: { types: [ opened ] }
  issues: { types: [ opened, reopened ] }
  issue_comment: { types: [ created ] }

defaults:
  run:
    shell: "bash"

env:
  # this is set to true in repository settings, but we default to false here to make it easier to turn off
  GEMINI_CLI_TRUST_WORKSPACE: ${{ vars.GEMINI_CLI_TRUST_WORKSPACE || 'false' }}

jobs:
  debugger:
    if: |-
      ${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || 'false') }}
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
    steps:
      - name: "Print context for debugging"
        env:
          DEBUG_event_name: "${{ github.event_name }}"
          DEBUG_event__action: "${{ github.event.action }}"
          DEBUG_event__comment__author_association: "${{ github.event.comment.author_association }}"
          DEBUG_event__issue__author_association: "${{ github.event.issue.author_association }}"
          DEBUG_event__pull_request__author_association: "${{ github.event.pull_request.author_association }}"
          DEBUG_event__review__author_association: "${{ github.event.review.author_association }}"
          DEBUG_event: "${{ toJSON(github.event) }}"
        run: |-
          env | grep '^DEBUG_'

  dispatch:
    # For PRs: only if not from a fork
    # For issues: only on open/reopen
    # For comments: only if user types @gemini-cli and is OWNER/MEMBER/COLLABORATOR
    if: |-
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.fork == false
      ) || (
        github.event_name == 'issues' &&
        contains(fromJSON('["opened", "reopened"]'), github.event.action)
      ) || (
        github.event.sender.type == 'User' &&
        startsWith(github.event.comment.body || github.event.review.body || github.event.issue.body, '@gemini-cli') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association || github.event.review.author_association || github.event.issue.author_association)
      )
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      command: "${{ steps.extract_command.outputs.command }}"
      request: "${{ steps.extract_command.outputs.request }}"
      additional_context: "${{ steps.extract_command.outputs.additional_context }}"
      issue_number: "${{ github.event.pull_request.number || github.event.issue.number }}"
      github_token: "${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}"
      gemini_api_key: "${{ secrets.GEMINI_API_KEY }}"
      app_id: "${{ vars.APP_ID || vars.CLIENT_ID }}"
      app_private_key: "${{ secrets.APP_PRIVATE_KEY }}"
      
    steps:
      - name: "Mint identity token"
        id: "mint_identity_token"
        if: |-
          ${{ vars.APP_ID || vars.CLIENT_ID }}
        uses: "actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3"
        with:
          client-id: "${{ vars.APP_ID || vars.CLIENT_ID }}"
          private-key: "${{ secrets.APP_PRIVATE_KEY || vars.APP_PRIVATE_KEY }}"
          permission-contents: "read"
          permission-issues: "write"
          permission-pull-requests: "write"

      - name: "Extract command"
        id: "extract_command"
        uses: "actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3"
        env:
          EVENT_TYPE: "${{ github.event_name }}.${{ github.event.action }}"
          REQUEST: "${{ github.event.comment.body || github.event.review.body || github.event.issue.body }}"
        with:
          script: |
            const eventType = process.env.EVENT_TYPE;
            const request = process.env.REQUEST;
            core.setOutput('request', request);

            if (eventType === 'pull_request.opened') {
              core.setOutput('command', 'review');
            } else if (['issues.opened', 'issues.reopened'].includes(eventType)) {
              core.setOutput('command', 'triage');
            } else if (request.startsWith("@gemini-cli /review")) {
              core.setOutput('command', 'review');
              const additionalContext = request.replace(/^@gemini-cli \/review/, '').trim();
              core.setOutput('additional_context', additionalContext);
            } else if (request.startsWith("@gemini-cli /triage")) {
              core.setOutput('command', 'triage');
            } else if (request.startsWith("@gemini-cli /approve")) {
              core.setOutput('command', 'approve');
            } else if (request.startsWith("@gemini-cli")) {
              const additionalContext = request.replace(/^@gemini-cli/, '').trim();
              core.setOutput('command', 'invoke');
              core.setOutput('additional_context', additionalContext);
            } else {
              core.setOutput('command', 'fallthrough');
            }

      - name: "Acknowledge request"
        env:
          GITHUB_TOKEN: "${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}"
          ISSUE_NUMBER: "${{ github.event.pull_request.number || github.event.issue.number }}"
          MESSAGE: |-
            🤖 Hi @${{ github.actor }}, I've received your request, and I'm working on it now! You can track my progress [in the logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
          REPOSITORY: "${{ github.repository }}"
        run: |-
          gh issue comment "${ISSUE_NUMBER}" \
            --body "${MESSAGE}" \
            --repo "${REPOSITORY}"

  review:
    needs: "dispatch"
    if: |-
      ${{ needs.dispatch.outputs.command == 'review' }}
    uses: "marquetools/.github/.github/workflows/gemini-review.yml@d17343622078c19976da6edc4a295f484e1d93ab"
    permissions:
      contents: "read"
      id-token: "write"
      issues: "write"
      pull-requests: "write"
    with:
      github-token: "${{ needs.dispatch.outputs.github_token }}"
      gemini_api_key: "${{ needs.dispatch.outputs.gemini_api_key }}"
      additional_context: "${{ needs.dispatch.outputs.additional_context }}"
      app_id: "${{ needs.dispatch.outputs.app_id }}"
      app_private_key: "${{ needs.dispatch.outputs.app_private_key }}"
      gemini_debug: ${{ vars.GEMINI_DEBUG }}
      mise_env: ${{ vars.MISE_ENV || '' }}
    secrets: "inherit"

  triage:
    needs: "dispatch"
    if: |-
      ${{ needs.dispatch.outputs.command == 'triage' }}
    uses: "marquetools/.github/.github/workflows/gemini-triage.yml@d17343622078c19976da6edc4a295f484e1d93ab"
    permissions:
      contents: "read"
      id-token: "write"
      issues: "write"
      pull-requests: "write"
    with:
      github-token: "${{ needs.dispatch.outputs.github_token }}"
      gemini_api_key: "${{ needs.dispatch.outputs.gemini_api_key }}"
      additional_context: "${{ needs.dispatch.outputs.additional_context }}"
      app_id: "${{ needs.dispatch.outputs.app_id }}"
      app_private_key: "${{ needs.dispatch.outputs.app_private_key }}"
      gemini_debug: ${{ vars.GEMINI_DEBUG }}
      mise_env: ${{ vars.MISE_ENV }}
    secrets: "inherit"

  invoke:
    needs: "dispatch"
    if: |-
      ${{ needs.dispatch.outputs.command == 'invoke' }}
    uses: "marquetools/.github/.github/workflows/gemini-invoke.yml@d17343622078c19976da6edc4a295f484e1d93ab"
    permissions:
      contents: "read"
      id-token: "write"
      issues: "write"
      pull-requests: "write"
    with:
      github-token: "${{ needs.dispatch.outputs.github_token }}"
      gemini_api_key: "${{ needs.dispatch.outputs.gemini_api_key }}"
      additional_context: "${{ needs.dispatch.outputs.additional_context }}"
      app_id: "${{ needs.dispatch.outputs.app_id }}"
      app_private_key: "${{ needs.dispatch.outputs.app_private_key }}"
      gemini_debug: ${{ vars.GEMINI_DEBUG }}
      mise_env: ${{ vars.MISE_ENV }}
    secrets: "inherit"

  plan-execute:
    needs: "dispatch"
    if: |-
      ${{ needs.dispatch.outputs.command == 'approve' }}
    uses: "marquetools/.github/.github/workflows/gemini-plan-execute.yml@d17343622078c19976da6edc4a295f484e1d93ab"
    permissions:
      contents: "write"
      id-token: "write"
      issues: "write"
      pull-requests: "write"
    with:
      github-token: "${{ needs.dispatch.outputs.github_token }}"
      gemini_api_key: "${{ needs.dispatch.outputs.gemini_api_key }}"
      additional_context: "${{ needs.dispatch.outputs.additional_context }}"
      app_id: "${{ needs.dispatch.outputs.app_id }}"
      app_private_key: "${{ needs.dispatch.outputs.app_private_key }}"
      gemini_debug: ${{ vars.GEMINI_DEBUG }}
      mise_env: ${{ vars.MISE_ENV }}
    secrets: "inherit"

  fallthrough:
    needs:
      - "dispatch"
      - "review"
      - "triage"
      - "invoke"
      - "plan-execute"
    if: |-
      ${{ always() && !cancelled() && (failure() || needs.dispatch.outputs.command == 'fallthrough') }}
    runs-on: "ubuntu-latest"
    permissions:
      contents: "read"
      issues: "write"
      pull-requests: "write"
    steps:
      - name: "Mint identity token"
        id: "mint_identity_token"
        if: |-
          ${{ vars.APP_ID || vars.CLIENT_ID }}
        uses: "actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3" # ratchet:actions/create-github-app-token@v2
        with:
          client-id: "${{ vars.APP_ID || vars.CLIENT_ID }}"
          private-key: "${{ secrets.APP_PRIVATE_KEY || vars.APP_PRIVATE_KEY || needs.dispatch.outputs.app_private_key }}"
          permission-contents: "read"
          permission-issues: "write"
          permission-pull-requests: "write"

      - name: "Send failure comment"
        env:
          GITHUB_TOKEN: "${{ needs.dispatch.outputs.github_token || secrets.GITHUB_TOKEN || github.token }}"
          ISSUE_NUMBER: "${{ github.event.pull_request.number || github.event.issue.number }}"
          MESSAGE: |-
            🤖 I'm sorry @${{ github.actor }}, but I was unable to process your request. Please [see the logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for more details.
          REPOSITORY: "${{ github.repository }}"
        run: |-
          gh issue comment "${ISSUE_NUMBER}" \
            --body "${MESSAGE}" \
            --repo "${REPOSITORY}"
