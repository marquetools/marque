version = 1
SPDX-PackageName = "marque"
SPDX-PackageSupplier = "Knitli Inc. <knitli@knitli.com>"
SPDX-PackageDownloadLocation = "https://github.com/marquetools/marque"

[[annotations]]
path = [
  "crates/capco/docs/CAPCO*.md",
  "crates/capco/docs/ICMarkings*.md",
  "crates/capco/docs/original-refs/CAPCO*.pdf",
  "crates/capco/docs/original-refs/ICMarkings*.ppt",
]
precedence = "closest"
SPDX-FileCopyrightText = "United States Government, Public Domain"
SPDX-License-Identifier = "LicenseRef-PublicDomain"

# ODNI ISM schemas formerly under `crates/ism/schemas/` are now consumed
# via the `ism` and `ism-ismcat` build-dependencies from
# https://github.com/marquetools/ism-data, which carry their own REUSE
# annotations alongside the data files.

[[annotations]]
path = [
  "_typos.toml",
  ".gitattributes",
  ".github/workflows/**",
  ".github/ISSUE_TEMPLATE/**",
  ".github/PULL_REQUEST_TEMPLATE/**",
  ".github/actions/**",
  ".github/commands/**",
  ".gitignore",
  "cliff.toml",
  "AGENTS.md",
  "**/AGENTS.md",
  "GEMINI.md",
  "**/GEMINI.md",
  "CHANGELOG.md",
  "CODEOWNERS",
  "**/CHANGELOG.md",
  "**/CODEOWNERS",
  "CLAUDE.md",
  "**/CLAUDE.md",
  "CODE_OF_CONDUCT.md",
  "CONTRIBUTING.md",
  "CONTRIBUTORS_LICENSE_AGREEMENT.md",
  "deny.toml",
  "site/src/content/**",
  "LICENSE.md",
  "mise.toml",
  "README.md",
  "SECURITY.md",
  ".specify/memory/constitution.md",
  "docs/security/**",
  "**/Cargo.toml",
  "**/Cargo.lock",
  "**/mise.toml",
  "mise.toml",
  "Cargo.toml",
  "Cargo.lock",
  "**/README.md",
  "**/SHA256SUMS",
]
precedence = "override"
SPDX-FileCopyrightText = "2026 Knitli Inc. <knitli@knitli.com>"
SPDX-License-Identifier = "MIT OR Apache-2.0"

# cargo-vet store. These files are machine-managed (`cargo vet fmt`
# rewrites them in a canonical form and strips inline comments, so a
# per-file SPDX header would not survive), and like `Cargo.lock` they
# mirror third-party data (imports.lock caches other orgs' audits).
# Annotated here rather than via inline headers for the same reason
# the lockfile is. `supply-chain/README.md` is covered by `**/README.md`.
[[annotations]]
path = [
  "supply-chain/config.toml",
  "supply-chain/audits.toml",
  "supply-chain/imports.lock",
]
precedence = "override"
SPDX-FileCopyrightText = "2026 Knitli Inc. <knitli@knitli.com>"
SPDX-License-Identifier = "MIT OR Apache-2.0"

[[annotations]]
path = [
  ".github/prompts/speckit.*.md",
  ".github/agents/speckit.*.agent.md",
  ".claude/commands/speckit.*.md",
  ".gemini/commands/speckit.*.toml",
  ".specify/scripts/**",
  ".specify/templates/**",
]
precedence = "override"
SPDX-FileCopyrightText = "GitHub Inc."
SPDX-License-Identifier = "MIT"

[[annotations]]
path = [
  "**/docs/plans/**",
  "**/plans/**",
  "**/specs/**",
  "docs/plans/**",
  ".claude/PRPs/**",
  "plans/**",
  "specs/**",
]
precedence = "override"
SPDX-FileCopyrightText = "2026 Knitli Inc. <knitli@knitli.com>"
SPDX-License-Identifier = "LicenseRef-MarqueLicense-1.0"

[[annotations]]
path = [
  "tests/corpus/capco/invalid/**",
  "tests/corpus/capco/lattice/**",
  "tests/corpus/capco/valid/**",
  "tests/corpus/capco/prose/**",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Knitli Inc. <knitli@knitli.com>"
SPDX-License-Identifier = "LicenseRef-MarqueLicense-1.0"

# masking-pin-lint cache directory (D11 in
# specs/006-engine-rule-refactor/decisions.md). Files are JSON state
# snapshots written by the lint tool; they accumulate one file per
# tracked issue over time, so an annotation is preferable to per-file
# sidecars.
[[annotations]]
path = [
  "tools/masking-pin-lint/cache/**",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Knitli Inc. <knitli@knitli.com>"
SPDX-License-Identifier = "LicenseRef-MarqueLicense-1.0"

[[annotations]]
path = [
  "tests/**",
  "**/tests/**",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Knitli Inc."
SPDX-License-Identifier = "LicenseRef-MarqueLicense-1.0"

# proptest persistent failure seeds. Each `*.proptest-regressions` file
# carries a real property-test failure seed, checked in so CI re-tries
# the same input before any new shrink work. The pattern is named here
# directly (rather than inherited from `tests/**` above) so a future
# narrowing of the test-coverage block cannot silently strip license
# coverage from these files. The .gitignore carries a matching policy
# comment forbidding `*.proptest-regressions` exclusion. Issue #704
# (P3 monotonicity violation in CAPCO closure) is the canonical case:
# the failing seed `cc e88bf36f...` became permanently regression-tested
# once tracked. Annotation is `aggregate` so per-file `.license`
# sidecars (where they exist) continue to apply alongside.
[[annotations]]
path = [
  "**/*.proptest-regressions",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Knitli Inc. <knitli@knitli.com>"
SPDX-License-Identifier = "LicenseRef-MarqueLicense-1.0"

# Local Claude Code skill content (lattice-consultant). Default for the skill
# tree is Knitli-authored skill tooling. `closest` precedence so files with
# their own SPDX header (e.g., references/capco-context.md, which carries
# MIT OR Apache-2.0 from the upstream crates/capco/CAPCO-CONTEXT.md vendor
# source) keep their own license. No third-party PDFs are vendored under
# sources/ — every primary source is cite-and-link only.
[[annotations]]
path = [
  ".claude/skills/marque-lattice-consultant/**",
]
precedence = "closest"
SPDX-FileCopyrightText = "2026 Knitli Inc. <knitli@knitli.com>"
SPDX-License-Identifier = "LicenseRef-MarqueLicense-1.0"

# Gramine deploy assets (issue #184 Part B). The `.md` README and the
# `.yml` workflow are already covered by the `**/README.md` and
# `.github/workflows/**` globs above; the Gramine `.manifest.template`
# extension is not, so it is annotated here. `aggregate` so the inline
# SPDX header the template already carries continues to apply.
[[annotations]]
path = [
  "deploy/gramine/*.template",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 Knitli Inc. <knitli@knitli.com>"
SPDX-License-Identifier = "LicenseRef-MarqueLicense-1.0"
