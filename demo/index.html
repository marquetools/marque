<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marque — Interactive Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <a class="logo" href="#">mar<span>que</span></a>
  <span class="nav-hint">CAPCO classification-marking linter &amp; auto-fixer</span>
</nav>

<div class="page-wrapper">

  <!-- Document card -->
  <div class="document" id="document-card">

    <!-- Top banner (auto-updated from portion markings) -->
    <div class="banner level-empty" id="banner-top">Loading…</div>

    <!-- Memo header (non-editable) -->
    <div class="doc-header">
      <table>
        <tr>
          <td>MEMORANDUM FOR:</td>
          <td>Distribution List</td>
        </tr>
        <tr>
          <td>FROM:</td>
          <td>Office of the Directorate</td>
        </tr>
        <tr>
          <td>SUBJECT:</td>
          <td>Intelligence Assessment — Program Status</td>
        </tr>
        <tr>
          <td>DATE:</td>
          <td id="doc-date"></td>
        </tr>
      </table>
      <hr class="doc-divider" />
    </div>

    <!-- Editable body — CodeMirror mounts here -->
    <div class="doc-body">
      <div id="editor-mount"></div>
    </div>

    <!-- Bottom banner (mirrors top) -->
    <div class="banner level-empty" id="banner-bottom">Loading…</div>

  </div>

  <!-- Audit stream — blends with page background, prepends entries as fixes fire -->
  <div class="audit-stream" id="audit-stream" aria-label="Correction audit log">
    <div class="audit-empty" id="audit-empty">Corrections will appear here as you type.</div>
  </div>

</div>

<script>
  const d = new Date();
  document.getElementById('doc-date').textContent =
    d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
</script>

<script type="module" src="demo.js"></script>

</body>
</html>
