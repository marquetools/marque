#:schema https://raw.githubusercontent.com/crate-ci/typos/master/config.schema.json
#:tombi schema.strict = false

[files]
extend-exclude = [
  # The token_set source carries the canonical doc / regression-guard
  # narrative for every CAPCO keyword the fuzzy matcher can recover —
  # `SPCIAL`, `CCESS`, `SEPCIAL`, `NOFORON`, `SBUNOFORN`, etc. Each
  # of those lives in a doc comment whose entire purpose is showing
  # the typo→canonical mapping. Per-word allowlisting would track an
  # ever-growing list as new keyword recovery lands; whole-file
  # exclusion is the maintenance-cheap choice. Real typo coverage on
  # the file is not load-bearing — it has no user-facing strings, no
  # error messages, no public API names that need spell-checking.
  "crates/ism/src/token_set.rs",
  # Design docs and specs contain intentional misspellings as examples
  "docs/plans/",
  "docs/reviews/",
  "specs/",
  "tests/fixtures/mangled/",
  "site/src/assets/*/LICENSE*",
  # Vendored third-party bundle (CodeMirror 6 + dependencies); contains
  # intentional identifier abbreviations and minified tokens that trigger
  # false-positive typo hits.
  "demo/vendor.js",
  # Font asset directories: binary font files and their upstream LICENSE
  # files contain axis-name codes (e.g. `wdth`) that are valid font
  # metadata, not spelling errors.
  "demo/assets/fonts/",
  "tests/corpus/documents/",
  # OCR cleanup script: every regex pattern in this file encodes a known
  # CAPCO-2016 OCR corruption (e.g. `r'clas sification'` → "classification",
  # `r'di sc l os ure'` → "disclosure", `r'elemenTheads'` → "element heads")
  # and the canonical replacement. The broken-word side of every pattern is
  # by definition a misspelling typos cannot distinguish from a real one.
  # Per-pattern allowlisting would grow without bound as new OCR cases
  # land; whole-file exclusion is the maintenance-cheap choice.
  "scripts/clean_ocr.py",
]

[default]
binary = false
check-file = true
check-filename = true
extend-ignore-identifiers-re = []
extend-ignore-re = [
  # Ignore lines that end with `# spellchecker:disable-line`
  "(?Rm)^.*(#|//|///|//!)\\s*spellchecker:disable-line$",
  # Ignore the line after `# spellchecker:ignore-next-line`:
  "(#|//|///|//!)\\s*spellchecker:ignore-next-line\\n.*",
  # Ignore blocks between `# spellchecker:off` and `# spellchecker:on`
  "(?s)(#|//|///|//!)\\s*spellchecker:off.*?\\n\\s*(#|//|///|//!)\\s*spellchecker:on",
]
extend-ignore-words-re = []
identifier-leading-digits = false
ignore-hex = true
locale = "en-us"
unicode = true

[default.extend-words]
# Intentional misspellings used in corrections map test data
SECRECT = "SECRECT"
SECERT = "SECERT"
CONFIDENTAL = "CONFIDENTAL"
ND = "ND"
# Intentional misspellings used in fuzzy vocab matcher tests and documentation
SERCET = "SERCET"
NOFRON = "NOFRON"
CONFIDETIAL = "CONFIDETIAL"
SECRRET = "SECRRET"
UNCLASSIFEID = "UNCLASSIFEID"
canonicalizations = "canonicalizations"
# Intentional misspellings for SAR indicator-keyword recovery (issue #133 PR 6).
# These appear in `crates/engine/src/decoder.rs` doc comments, unit-test
# names, and `crates/engine/tests/decoder_recovery.rs` integration-test
# names that pin the SAR-keyword fuzzy-match recovery path. Each is the
# fixture-derived typo of `SPECIAL` / `ACCESS` from the SC-004 mangled
# corpus; the canonical replacement is the unmangled keyword.
SPCIAL = "SPCIAL"
SEPCIAL = "SEPCIAL"
SPECAL = "SPECAL"
spcial = "spcial"
# Intentional misspellings for 3-char classification typo recovery
# (issue #133 PR 8). `ECRET` appears in test code and doc comments
# describing the `TOPS ECRET` token-boundary typo (the leading `S`
# of `SECRET` migrated to the end of `TOP`); the canonical
# replacement is `SECRET`. `OTP` and `UOP` are corpus-attested
# `TOP` typos used in test names and doc comments.
ECRET = "ECRET"
OTP = "OTP"
UOP = "UOP"
# Intentional misspellings for REL TO header recovery (issue #133
# PR 9). `OT` is the corpus-attested TO transposition (`REL OT` →
# `REL TO`); `RELT` is the token-boundary slip (`RELT O` →
# `REL TO`). Both appear in `crates/engine/src/decoder.rs` doc
# comments, unit-test names, and `crates/engine/tests/decoder_recovery.rs`
# integration-test doc comments that pin the REL TO structural
# repair recovery path.
OT = "OT"
ot = "ot"
RELT = "RELT"
# PR 3d FR-053 — verbatim ODNI ISM `<Description>` text reproduction.
# `Controled` (single L) is the actual misspelling published in the
# ODNI ISM-v2022-DEC schema package for CNWDI's Description field;
# `crates/ism/src/marking_forms.rs` carries it byte-identical so the
# divergence-count test in
# `crates/ism/tests/description_title_divergence.rs` can pin it as a
# regression guard. Constitution Principle VIII (Authoritative Source
# Fidelity) — reproducing the source's typos verbatim is the correct
# behavior; "fixing" the spelling would silently mask the upstream
# divergence we are explicitly tracking. Affects the
# `description_title` field text + doc comments in
# `crates/ism/src/marking_forms.rs`, the catalog doc comment in
# `crates/ism/tests/description_title_divergence.rs`, and a derived
# reference in `crates/capco/tests/vocabulary_forms.rs`.
Controled = "Controled"
axe = "axe"
# Python package names that look like typos but aren't
certifi = "certifi"

[default.extend-identifiers]
# Hyphenated "mis-splice" is intentional in rule comments
mis = "mis"

# "unparseable" is acceptable (both forms exist in English)
unparseable = "unparseable"

[type.xml.extend-words]
HED = "HED"
