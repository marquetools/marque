[package]
name = "marque-ism"
version = "0.2.1"
edition.workspace = true
rust-version.workspace = true
description = "ISM vocabulary types, generated CVE enums, and Span for marque"
repository.workspace = true
license-file = "LICENSE.md"

# Published tarball contents — keep tight. `build.rs` only reads the CVE XML
# files in CVE_ISM/ and the RelTo trigraph XSD in CVE_ISMCAT/CVEGenerated/.
# Everything else under schemas/ (Schematron/*.sch and *.xsl stylesheets,
# Schema/*.xsd/.rng, ISM-Rollup-v2021-NOV/, Documents/, XSPEC/) and the entire
# registers/ directory (CAPCO reference PDFs and presentations) is repo-only
# reference material — excluded because it pushes the crate past crates.io's
# 10 MiB upload limit. Expand this list when build.rs starts consuming new
# schema files.
include = [
  "Cargo.toml",
  "LICENSE.md*",
  "README.md",
  "build.rs",
  # Issue #183 PR-B: org-specific country-code extensions (built into
  # the binary at compile time). Default committed file is empty, so
  # publishing this is a no-op for upstream consumers; org forks edit
  # the file and rebuild.
  "country_extensions.toml",
  # NTK files included alongside ISM so build.rs sees the same JSON set
  # at crates.io as in the repo (build.rs reads every `*.json` under
  # CVE_ISM/ — a narrower include glob would silently drop NTK metadata
  # from the generated vocabulary tables in published builds).
  "schemas/ISM-v2022-DEC/CVE_ISM/CVEnum*.json",
  "schemas/ISM-v2022-DEC/CVE_ISM/CVEnumISM*.xml",
  "schemas/ISM-v2022-DEC/CVE_ISMCAT/CVEGenerated/CVEnumISMCATRelTo.xsd",
  # Issue #208: ISMCAT Tetragraph Taxonomy V2022-NOV. build.rs parses
  # only TetragraphTaxonomyDenormalized.xml; the canonical hierarchical
  # form is shipped alongside so a published-crate consumer can verify
  # ODNI's denormalization stayed in sync. The Documents/ISMCAT/*.pdf
  # human-readable reference is deliberately excluded — repo-only.
  "schemas/ISM-v2022-DEC/Taxonomy/ISMCAT/*.xml",
  "src/**/*.rs",
]

# Schema versions pinned here — bump intentionally when ODNI publishes updates.
# Schemas live in schemas/ISM-v<version>/. ISMCAT Tetragraph Taxonomy is
# versioned independently of the ISM bundle (TESVersion="202211" in the XML
# root) and lives at schemas/ISM-v2022-DEC/Taxonomy/ISMCAT/.
[package.metadata.marque]
ism-schema-version = "ISM-v2022-DEC"
ismcat-tetra-version = "2022-NOV"

[dependencies]
aho-corasick = { workspace = true }
jiff = { workspace = true }
# `marque-scheme` provides `Scope`, which `ProjectedMarking::scope`
# carries. The consolidated plan (`docs/plans/2026-05-02-engine-refactor-consolidated.md`
# Appendix D) anticipated an `marque-ism` ↔ `marque-scheme` edge as part
# of the PR-3a/3c keystone work. Both crates remain WASM-safe; the dep
# graph stays acyclic because `marque-scheme` does NOT depend on
# `marque-ism` (it stays a domain-neutral trait surface). The PR-3c
# `FixIntent<S>` work will land its own dep changes (`marque-rules →
# marque-scheme`) without re-routing this edge.
marque-scheme = { workspace = true }
serde = { workspace = true, optional = true }
smallvec = { workspace = true }

[dev-dependencies]
proptest = { workspace = true }
xmloxide = { workspace = true }

[build-dependencies]
anyhow = { workspace = true }
memchr = { workspace = true }
quick-xml = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }

[features]
default = []
serde = ["dep:serde"]

[lints]
workspace = true
