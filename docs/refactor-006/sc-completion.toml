#
# Success-criteria completion status for `006-engine-rule-refactor`.
#
# Closes tasks T123 + T136 + T137 of
# `specs/006-engine-rule-refactor/tasks.md`. Data-driven shape per
# PR 10.B's architect preflight: declare each SC's check method,
# expected value, and current status in this TOML, render the
# human-readable report at `sc-completion-report.md` via
# `tools/sc-completion-report/render.py`. The TOML is the source of
# truth; the markdown is generated cold-storage.
#
# Schema:
#
#   [[sc]]
#   id            = "SC-NNN"          # canonical identifier
#   name          = "Short title"     # one-line summary (≤80 chars)
#   check_kind    = "<kind>"          # see "Check kinds" below
#   check_ref     = "<path or job>"   # primary artifact (test, bench, CI job)
#   evidence      = "<concrete>"      # what proves the SC is met
#   status        = "<status>"        # see "Status values" below
#   notes         = "<honest text>"   # context, gaps, follow-ups
#
# Check kinds:
#   bench          — Criterion bench (baseline JSON + measurement)
#   corpus         — corpus regression fixture(s)
#   wasm-parity    — WASM-vs-native parity test
#   lint           — AST lint (citation, masking-pin, promote-callsite)
#   compile        — compile-fail / static-assert test
#   manual         — verified by hand against a documented artifact
#
# Status values:
#   verified         — evidence is green at PR 10.B HEAD
#   verified-recent  — evidence was green on the most recent merged
#                      commit; verifier did not re-run locally
#   regressed        — evidence shows a known regression carried
#                      forward (carry-forward documented in `notes`)
#   partial          — evidence covers some but not all sub-criteria
#   manual-verified  — verified by hand (no automated gate)
#   n/a              — sub-criterion does not apply post-refactor

[meta]
schema_version = "marque-sc-completion-1.0"
captured_at    = "2026-05-21"
captured_at_pr = "PR 10.B (refactor/006-pr10-B-polish)"
note           = "Each `evidence` entry is a concrete artifact; each `status` value derives from real CI / test / lint output."

